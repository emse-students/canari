spring.application.name=mines_app_auth_service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# OAuth2 Client Configuration (Registration)
# Substitute placeholders with your actual Client ID and Secret
# Example for Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder_client_secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Example for GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:placeholder_client_id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:placeholder_client_secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
