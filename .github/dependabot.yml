version: 2
updates:
  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'github-actions'
    open-pull-requests-limit: 5

  # Frontend npm dependencies
  - package-ecosystem: 'npm'
    directory: '/frontend'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'frontend'
    open-pull-requests-limit: 5
    groups:
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'patch'

  # Core Service npm dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/core-service'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'core-service'
    open-pull-requests-limit: 5

  # Social Service npm dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/social-service'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'social-service'
    open-pull-requests-limit: 5

  # Media Service npm dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/media-service'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'media-service'
    open-pull-requests-limit: 5

  # Chat Delivery Service npm dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/chat-delivery-service'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'chat-delivery-service'
    open-pull-requests-limit: 5

  # Shared TS library npm dependencies
  - package-ecosystem: 'npm'
    directory: '/libs/shared-ts'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'npm'
      - 'shared-ts'
    open-pull-requests-limit: 5

  # Cargo dependencies (workspace root: shared lib, call-service, chat-gateway, mls-*)
  - package-ecosystem: 'cargo'
    directory: '/'
    rebase-strategy: auto
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(deps):'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'cargo'
    open-pull-requests-limit: 5
