name: Cache Cleanup

# GitHub Actions cache quota is 10 GB per repo. Docker buildkit caches
# (type=gha) create one cache entry per blob and are never evicted
# automatically, so they silently accumulate until `cache-to` starts failing
# with "failed to reserve cache". This workflow prunes old buildkit entries
# weekly so the quota stays well under the limit.

on:
  schedule:
    # Every Sunday at 3 AM UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  prune-buildkit-caches:
    name: Prune stale buildkit caches
    runs-on: ubuntu-latest
    steps:
      - name: Delete buildkit caches older than 7 days
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          CUTOFF=$(date -d '7 days ago' +%s)

          echo "Pruning buildkit caches older than $(date -d @$CUTOFF -Iseconds)..."

          gh cache list --repo "$REPO" --limit 200 --json id,key,createdAt \
            --jq '.[] | select(.key | startswith("buildkit-") or startswith("index-buildkit-")) | "\(.id) \(.createdAt)"' \
          | while read -r id created; do
              created_ts=$(date -d "$created" +%s 2>/dev/null || echo 0)
              if [ "$created_ts" -lt "$CUTOFF" ]; then
                echo "  Deleting cache $id (created $created)"
                gh cache delete "$id" --repo "$REPO" || true
              fi
            done

          echo "Pruning complete."
