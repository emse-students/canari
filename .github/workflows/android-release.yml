name: Android Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -ra PARTS <<< "$VERSION"
          while [ "${#PARTS[@]}" -lt 3 ]; do PARTS+=("0"); done
          VERSION="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}"
          jq --arg v "$VERSION" '.version = $v' frontend/package.json > tmp.json && mv tmp.json frontend/package.json
          jq --arg v "$VERSION" '.version = $v' frontend/src-tauri/tauri.conf.json > tmp.json && mv tmp.json frontend/src-tauri/tauri.conf.json
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Commit version bump
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/src-tauri/tauri.conf.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME#v} [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install
          bunx svelte-kit sync

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate Android release secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            ANDROID_STORE_PASSWORD
            JWT_SECRET
            BASE_URL
            AUTHENTIK_URL
            AUTHENTIK_CLIENT_ID
            GOOGLE_SERVICES_JSON
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          echo "✅ Required Android secrets are present"

      - name: Setup Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Decoding keystore..."
          cd frontend/src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
          echo "Creating keystore.properties..."
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> keystore.properties
          echo "storePassword=$ANDROID_STORE_PASSWORD" >> keystore.properties
          echo "storeFile=release.jks" >> keystore.properties

          echo "Writing google-services.json from secret..."
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "✅ google-services.json written"

      - name: Verify signing files are populated
        run: |
          test -s frontend/src-tauri/gen/android/release.jks
          test -s frontend/src-tauri/gen/android/keystore.properties
          grep -q '^keyAlias=' frontend/src-tauri/gen/android/keystore.properties
          grep -q '^keyPassword=' frontend/src-tauri/gen/android/keystore.properties
          grep -q '^storePassword=' frontend/src-tauri/gen/android/keystore.properties
          echo "✅ Android signing material prepared"

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          # Use empty values for URLs to trigger fallback to window.location logic (or defaults)
          # Or set specific production URLs here if desired.
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env

      - name: Verify frontend env for Android build
        working-directory: frontend
        run: |
          grep -q '^VITE_GATEWAY_URL=.' .env
          grep -q '^VITE_DELIVERY_URL=.' .env
          grep -q '^VITE_MEDIA_URL=.' .env
          grep -q '^VITE_CALL_URL=.' .env
          grep -q '^VITE_SOCIAL_URL=.' .env
          grep -q '^VITE_CORE_URL=.' .env
          grep -q '^VITE_AUTHENTIK_URL=.' .env
          grep -q '^VITE_AUTHENTIK_CLIENT_ID=.' .env
          echo "✅ Android frontend env prepared"

      - name: Build Android AAB
        working-directory: frontend
        run: bun tauri android build

      - name: Locate AAB
        id: aab
        run: |
          AAB=$(find frontend/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | grep -i "universalRelease\|release" | head -1)
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
          echo "Found AAB: $AAB"

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: ${{ steps.aab.outputs.path }}

      - name: Upload AAB to Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: ${{ steps.aab.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fr.emse.canari
          releaseFiles: ${{ steps.aab.outputs.path }}
          track: internal
          status: completed
