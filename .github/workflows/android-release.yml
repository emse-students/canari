name: Android Release

# Runs after "Bump version on release" syncs frontend/package.json on main.
on:
  workflow_run:
    workflows: ['Bump version on release']
    types: [completed]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Resolve release tag
        id: release_tag
        run: |
          VERSION="$(bash scripts/read-app-version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Canari v${VERSION}"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx svelte-kit sync

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate Android release secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            ANDROID_STORE_PASSWORD
            JWT_SECRET
            BASE_URL
            AUTHENTIK_URL
            AUTHENTIK_CLIENT_ID
            GOOGLE_SERVICES_JSON
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          echo "✅ Required Android secrets are present"

      - name: Setup Android Signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "Decoding keystore…"
          cd frontend/src-tauri/gen/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.jks
          echo "Creating keystore.properties…"
          echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> keystore.properties
          echo "storePassword=$ANDROID_STORE_PASSWORD" >> keystore.properties
          echo "storeFile=release.jks" >> keystore.properties

          echo "Writing google-services.json from secret…"
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          echo "✅ google-services.json written"

      - name: Verify signing files are populated
        run: |
          test -s frontend/src-tauri/gen/android/release.jks
          test -s frontend/src-tauri/gen/android/keystore.properties
          grep -q '^keyAlias=' frontend/src-tauri/gen/android/keystore.properties
          grep -q '^keyPassword=' frontend/src-tauri/gen/android/keystore.properties
          grep -q '^storePassword=' frontend/src-tauri/gen/android/keystore.properties
          echo "✅ Android signing material prepared"

      - name: Print Android App Link SHA-256 fingerprint
        run: |
          chmod +x scripts/print-android-app-link-fingerprint.sh
          ./scripts/print-android-app-link-fingerprint.sh
          echo "::notice::Add this SHA-256 to GitHub secret ANDROID_APP_LINK_SHA256, then redeploy frontend (cd workflow)."

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}
        run: |
          echo "VITE_FRONTEND_URL=${BASE_URL}" >> .env
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env
          echo "VITE_CALL_E2E_ENCRYPTION=false" >> .env
          if [ -n "$KLIPY_API_KEY" ]; then
            echo "VITE_KLIPY_KEY=${KLIPY_API_KEY}" >> .env
          fi

      - name: Verify frontend env for Android build
        working-directory: frontend
        run: |
          grep -q '^VITE_FRONTEND_URL=.' .env
          grep -q '^VITE_GATEWAY_URL=.' .env
          grep -q '^VITE_DELIVERY_URL=.' .env
          grep -q '^VITE_MEDIA_URL=.' .env
          grep -q '^VITE_CALL_URL=.' .env
          grep -q '^VITE_SOCIAL_URL=.' .env
          grep -q '^VITE_CORE_URL=.' .env
          grep -q '^VITE_AUTHENTIK_URL=.' .env
          grep -q '^VITE_AUTHENTIK_CLIENT_ID=.' .env
          echo "✅ Android frontend env prepared"

      - name: Build Android AAB + APK
        working-directory: frontend
        run: |
          bun tauri android build
          bun tauri android build --apk

      - name: Locate build outputs
        id: outputs
        run: |
          AAB=$(find frontend/src-tauri/gen/android/app/build/outputs/bundle -name "*.aab" | head -1)
          APK=$(find frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release -name "*.apk" | head -1)
          echo "aab=$AAB" >> "$GITHUB_OUTPUT"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"
          echo "AAB: $AAB"
          echo "APK: $APK"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            ${{ steps.outputs.outputs.aab }}
            ${{ steps.outputs.outputs.apk }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'workflow_run'
        with:
          tag_name: v${{ steps.release_tag.outputs.version }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.outputs.outputs.aab }}
            ${{ steps.outputs.outputs.apk }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The `secrets` context is unavailable in a step-level `if:`, so expose the
      # presence of the Google Play key as an output and gate the publish step on it.
      # This keeps the build/release green until the secret exists.
      - name: Check Google Play secret
        id: gplay
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set; skipping Google Play publish"
          fi

      # Publishes the signed AAB to Google Play (internal track).
      # See docs/publication-stores.md for how to create the service account.
      # NOTE: Google requires the very first AAB to be uploaded MANUALLY in the Play Console
      # before the API will accept uploads for fr.emse.canari.
      - name: Publish to Google Play (internal track)
        if: github.event_name == 'workflow_run' && steps.gplay.outputs.present == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fr.emse.canari
          releaseFiles: ${{ steps.outputs.outputs.aab }}
          track: internal
          status: completed
