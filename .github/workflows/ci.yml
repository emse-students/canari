name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-rust:
    name: Test Rust Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake

      - name: Check Formatting - Shared Rust
        working-directory: libs/shared-rust
        run: cargo fmt -- --check

      - name: Check Formatting - Chat Gateway
        working-directory: apps/chat-gateway
        run: cargo fmt -- --check

      - name: Check Formatting - Frontend MLS Core
        working-directory: frontend/mls-core
        run: cargo fmt -- --check

      - name: Check Formatting - Frontend MLS WASM
        working-directory: frontend/mls-wasm
        run: cargo fmt -- --check

      - name: Lint with Clippy - Shared Rust
        working-directory: libs/shared-rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint with Clippy - Chat Gateway
        working-directory: apps/chat-gateway
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint with Clippy - Frontend MLS Core
        working-directory: frontend/mls-core
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Lint with Clippy - Frontend MLS WASM
        working-directory: frontend/mls-wasm
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test Shared Rust Lib
        working-directory: libs/shared-rust
        run: cargo test

      - name: Test Chat Gateway
        working-directory: apps/chat-gateway
        run: cargo test

      - name: Test Frontend MLS Core
        working-directory: frontend/mls-core
        run: cargo test --lib

      - name: Build Frontend MLS WASM
        working-directory: frontend/mls-wasm
        run: cargo build --target wasm32-unknown-unknown --release

  test-typescript:
    name: Test TypeScript Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Test Chat History Service
        working-directory: apps/chat-delivery-service
        run: |
          npm ci
          npm run lint
          npm test
