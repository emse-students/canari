name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  # =================================================================================================
  # RUST MATRIX
  # =================================================================================================
  test-rust:
    name: Test Rust (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: Shared Rust Lib
            path: libs/shared-rust
            cmd: cargo test
            check: true
          - name: Chat Gateway
            path: apps/chat-gateway
            cmd: cargo test
            check: true
          - name: Call Service
            path: apps/call-service
            cmd: cargo test
            check: true
          - name: Frontend MLS Core
            path: frontend/mls-core
            cmd: cargo test --lib
            check: true
          - name: Frontend MLS WASM
            path: frontend/mls-wasm
            cmd: cargo build --target wasm32-unknown-unknown --release
            wasm: true
            check: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev cmake libcurl4-openssl-dev pkg-config

      - name: Install WASM target
        if: matrix.component.wasm == true
        run: rustup target add wasm32-unknown-unknown

      - name: Check Formatting
        if: matrix.component.check == true
        working-directory: ${{ matrix.component.path }}
        run: cargo fmt -- --check

      - name: Lint with Clippy
        if: matrix.component.check == true
        working-directory: ${{ matrix.component.path }}
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Component Task
        working-directory: ${{ matrix.component.path }}
        run: ${{ matrix.component.cmd }}

  # =================================================================================================
  # TYPESCRIPT BACKEND MATRIX
  # =================================================================================================
  test-typescript-backend:
    name: Test TS Backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - libs/shared-ts
          - apps/auth-service
          - apps/chat-delivery-service
          - apps/media-service
          - apps/user-service
          - apps/post-service
          - apps/form-service
          - apps/channel-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build shared-ts first if it is not the current service
      - name: Build shared-ts (dependency)
        if: matrix.service != 'libs/shared-ts'
        working-directory: libs/shared-ts
        run: |
          npm ci
          npm run build

      - name: Install Dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Check Lint Script
        id: check_lint
        working-directory: ${{ matrix.service }}
        run: |
          if node -e 'if(!require("./package.json").scripts || !require("./package.json").scripts.lint) process.exit(1)'; then
            echo "has_lint=true" >> $GITHUB_OUTPUT
          else
            echo "has_lint=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Lint
        if: steps.check_lint.outputs.has_lint == 'true'
        working-directory: ${{ matrix.service }}
        run: npm run lint

      - name: Build
        working-directory: ${{ matrix.service }}
        run: npm run build

      - name: Check Test Script
        id: check_test
        working-directory: ${{ matrix.service }}
        run: |
          if node -e 'if(!require("./package.json").scripts || !require("./package.json").scripts.test) process.exit(1)'; then
            echo "has_test=true" >> $GITHUB_OUTPUT
          else
            echo "has_test=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Test
        if: steps.check_test.outputs.has_test == 'true'
        working-directory: ${{ matrix.service }}
        run: npm test

  # =================================================================================================
  # FRONTEND (SVELTE)
  # =================================================================================================
  test-frontend:
    name: Test Frontend (Svelte)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Sync SvelteKit
        working-directory: frontend
        run: bun run sync

      - name: Lint Frontend
        working-directory: frontend
        run: |
          bun run lint
          bun run check
          bun run format:check

      - name: Run Vitest unit tests
        working-directory: frontend
        run: bun run test

      - name: Run Vitest with coverage
        working-directory: frontend
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
