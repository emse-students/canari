name: CD - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet déclenchement manuel
  # GITHUB_TOKEN pushes from "Bump version on release" do not trigger `on: push` workflows.
  workflow_run:
    workflows: ['Bump version on release']
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  DOMAIN: canari-emse.fr
  DEPLOY_PATH: /home/canari/canari
  # After a version-bump push, checkout `main` tip (workflow_run SHA is the pre-push commit).
  CHECKOUT_REF: ${{ github.event_name == 'workflow_run' && 'main' || github.sha }}

jobs:
  run-ci:
    name: Run CI Checks
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/ci.yml
    with:
      git_ref: ${{ github.event_name == 'workflow_run' && 'main' || '' }}

  detect-changed-services:
    name: Detect Changed Services
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      services_csv: ${{ steps.detect.outputs.services_csv }}
      services_args: ${{ steps.detect.outputs.services_args }}
      any_changed: ${{ steps.detect.outputs.any_changed }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      - name: Detect modified services
        id: detect
        run: |
          set -euo pipefail

          declare -A SERVICE_DOCKERFILE=(
            [core-service]="./infrastructure/local/Dockerfile.core-service"
            [social-service]="./infrastructure/local/Dockerfile.social-service"
            [chat-gateway]="./infrastructure/local/Dockerfile.chat-gateway"
            [call-service]="./infrastructure/local/Dockerfile.call-service"
            [chat-delivery-service]="./infrastructure/local/Dockerfile.chat-delivery-service"
            [frontend]="./infrastructure/local/Dockerfile.frontend"
            [media-service]="./infrastructure/local/Dockerfile.media-service"
          )

          ALL_SERVICES=(
            core-service
            social-service
            chat-gateway
            call-service
            chat-delivery-service
            frontend
            media-service
          )

          CHANGED_SERVICES=()

          add_service() {
            local service="$1"
            for existing in "${CHANGED_SERVICES[@]}"; do
              if [ "$existing" = "$service" ]; then
                return 0
              fi
            done
            CHANGED_SERVICES+=("$service")
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch detected: building all services."
            CHANGED_SERVICES=("${ALL_SERVICES[@]}")
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Version bump workflow completed - redeploying core-service and frontend."
            LAST_MSG="$(git log -1 --pretty=%s)"
            if echo "$LAST_MSG" | grep -qE '^chore: bump version to '; then
              add_service core-service
              add_service frontend
            else
              echo "Latest main commit is not a version bump (${LAST_MSG}); skipping rebuild."
            fi
          else
            BEFORE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"

            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                BEFORE_SHA="$(git rev-parse HEAD~1)"
              else
                BEFORE_SHA="$HEAD_SHA"
              fi
            fi

            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$HEAD_SHA")"

            echo "Changed files between $BEFORE_SHA and $HEAD_SHA:"
            if [ -n "$CHANGED_FILES" ]; then
              echo "$CHANGED_FILES"
            else
              echo "(none)"
            fi

            while IFS= read -r file; do
              [ -z "$file" ] && continue

              case "$file" in
                apps/core-service/*|infrastructure/local/Dockerfile.core-service)
                  add_service core-service
                  ;;
                apps/social-service/*|infrastructure/local/Dockerfile.social-service)
                  add_service social-service
                  ;;
                apps/chat-gateway/*|libs/shared-rust/*|libs/proto/*|infrastructure/local/Dockerfile.chat-gateway)
                  add_service chat-gateway
                  ;;
                apps/call-service/*|infrastructure/local/Dockerfile.call-service)
                  add_service call-service
                  ;;
                apps/chat-delivery-service/*|libs/shared-ts/*|infrastructure/local/Dockerfile.chat-delivery-service)
                  add_service chat-delivery-service
                  ;;
                frontend/*|infrastructure/local/Dockerfile.frontend)
                  add_service frontend
                  ;;
                apps/media-service/*|infrastructure/local/Dockerfile.media-service)
                  add_service media-service
                  ;;
              esac
            done <<< "$CHANGED_FILES"

            # Version-only commits still need core-service (/api/version) and frontend rebuilds.
            if [ -n "$CHANGED_FILES" ]; then
              version_only=true
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                case "$file" in
                  */package.json|*/Cargo.toml|frontend/src-tauri/tauri.conf.json) ;;
                  *)
                    version_only=false
                    break
                    ;;
                esac
              done <<< "$CHANGED_FILES"
              if [ "$version_only" = true ]; then
                echo "Version manifest bump - forcing core-service and frontend image rebuild."
                add_service core-service
                add_service frontend
              fi
            fi
          fi

          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            MATRIX='{"include":[]}'
            SERVICES_CSV=""
            SERVICES_ARGS=""
            FRONTEND_CHANGED="false"
            ANY_CHANGED="false"
            echo "No image-producing service changes detected."
          else
            MATRIX_ITEMS=""
            FRONTEND_CHANGED="false"
            for service in "${CHANGED_SERVICES[@]}"; do
              dockerfile="${SERVICE_DOCKERFILE[$service]}"
              MATRIX_ITEMS+="{\"name\":\"$service\",\"context\":\".\",\"dockerfile\":\"$dockerfile\"},"
              if [ "$service" = "frontend" ]; then
                FRONTEND_CHANGED="true"
              fi
            done
            MATRIX_ITEMS="${MATRIX_ITEMS%,}"
            MATRIX="{\"include\":[${MATRIX_ITEMS}]}"
            SERVICES_CSV="$(IFS=,; echo "${CHANGED_SERVICES[*]}")"
            SERVICES_ARGS="$(IFS=' '; echo "${CHANGED_SERVICES[*]}")"
            ANY_CHANGED="true"
            echo "Services selected for image rebuild: ${SERVICES_ARGS}"
          fi

          {
            echo "matrix=$MATRIX"
            echo "services_csv=$SERVICES_CSV"
            echo "services_args=$SERVICES_ARGS"
            echo "any_changed=$ANY_CHANGED"
            echo "frontend_changed=$FRONTEND_CHANGED"
          } >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build Frontend
    needs: detect-changed-services
    if: |
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      needs.detect-changed-services.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: "latest" calls api.github.com/repos/oven-sh/bun/git/refs/tags and can 401 with GITHUB_TOKEN.
          bun-version: '1.2.18'

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx svelte-kit sync

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        working-directory: frontend/mls-wasm
        run: wasm-pack build --target web --out-dir ../src/lib/wasm

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate frontend build secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::error::Missing required GitHub secret: BASE_URL"
            exit 1
          fi
          if [ -z "$AUTHENTIK_URL" ]; then
            echo "::error::Missing required GitHub secret: AUTHENTIK_URL"
            exit 1
          fi
          if [ -z "$AUTHENTIK_CLIENT_ID" ]; then
            echo "::error::Missing required GitHub secret: AUTHENTIK_CLIENT_ID"
            exit 1
          fi

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUB_KEY }}
          ANDROID_APP_LINK_SHA256: ${{ secrets.ANDROID_APP_LINK_SHA256 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}
        run: |
          # VITE_GATEWAY_URL et VITE_DELIVERY_URL intentionnellement vides :
          # le code utilise window.location.origin comme fallback, ce qui fonctionne
          # derrière nginx (même domaine, /ws, /api/mls/ et /media/ routés par le reverse proxy).
          echo "VITE_FRONTEND_URL=${BASE_URL}" >> .env
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env
          if [ -n "$STRIPE_PUBLISHABLE_KEY" ]; then
            echo "VITE_STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}" >> .env
          fi
          if [ -n "$ANDROID_APP_LINK_SHA256" ]; then
            echo "VITE_ANDROID_APP_LINK_SHA256=${ANDROID_APP_LINK_SHA256}" >> .env
          fi
          if [ -n "$APPLE_TEAM_ID" ]; then
            echo "VITE_APPLE_TEAM_ID=${APPLE_TEAM_ID}" >> .env
          fi
          # In-app GIF picker (KLIPY). Optional - the GIF button is hidden when unset.
          if [ -n "$KLIPY_API_KEY" ]; then
            echo "VITE_KLIPY_KEY=${KLIPY_API_KEY}" >> .env
          fi

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  build-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [detect-changed-services, build-frontend]
    if: |
      always() &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      needs.detect-changed-services.result == 'success' &&
      needs.detect-changed-services.outputs.any_changed == 'true' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.detect-changed-services.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download frontend build artifact
        if: matrix.name == 'frontend'
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy-to-server:
    name: Deploy to Production Server
    runs-on: self-hosted
    needs: [run-ci, detect-changed-services, build-docker-images]
    if: |
      always() &&
      (github.event_name == 'workflow_run' || github.ref == 'refs/heads/main') &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') &&
      needs.run-ci.result == 'success' &&
      needs.detect-changed-services.result == 'success' &&
      (needs.build-docker-images.result == 'success' || needs.build-docker-images.result == 'skipped')
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://${{ env.DOMAIN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Log deployment start
        run: |
          echo "🚀 Starting deployment on self-hosted runner..."
          echo "User: $(whoami)"
          echo "Working directory: $(pwd)"
          echo "Deploy path: ${{ env.DEPLOY_PATH }}"

      - name: Setup environment variables
        run: |
          echo "REGISTRY=${{ env.REGISTRY }}" >> $GITHUB_ENV
          echo "IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}" >> $GITHUB_ENV
          # TAG=latest allows selective image rebuilds while keeping unchanged services deployable.
          echo "TAG=latest" >> $GITHUB_ENV

      - name: Resolve Docker access
        run: |
          if docker info >/dev/null 2>&1; then
            echo "DOCKER_CLI=docker" >> $GITHUB_ENV
            echo "DOCKER_COMPOSE=docker compose" >> $GITHUB_ENV
            echo "✅ Docker access available via docker"
          elif sudo -n docker info >/dev/null 2>&1; then
            echo "DOCKER_CLI=sudo docker" >> $GITHUB_ENV
            echo "DOCKER_COMPOSE=sudo docker compose" >> $GITHUB_ENV
            echo "✅ Docker access available via sudo docker"
          else
            echo "❌ Cannot access Docker daemon as current runner user"
            id
            ls -l /var/run/docker.sock || true
            echo "Runner user must be in docker group or have passwordless sudo for docker"
            exit 1
          fi

      - name: Authenticate to GHCR
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Logging into GHCR..."
          if [ "$DOCKER_CLI" = "docker" ]; then
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
          else
            echo "$GHCR_TOKEN" | sudo docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
          fi
          echo "✅ GHCR authentication successful"

      - name: Navigate to deployment directory
        run: |
          cd ${{ env.DEPLOY_PATH }}
          echo "📂 Current directory: $(pwd)"

      - name: Pull latest code
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "📥 Updating repository..."
          git fetch origin
          git reset --hard origin/main
          echo "✅ Code updated to $(git rev-parse --short HEAD)"

      - name: Sync runtime secrets into infrastructure/.env
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          AUTHENTIK_BASE_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          AUTHENTIK_CLIENT_SECRET: ${{ secrets.AUTHENTIK_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.BASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          CLOUDFLARE_CALLS_API_TOKEN: ${{ secrets.CLOUDFLARE_CALLS_API_TOKEN }}
          CLOUDFLARE_TURN_KEY_ID: ${{ secrets.CLOUDFLARE_TURN_KEY_ID }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          MIGALLERY_API_KEY: ${{ secrets.MIGALLERY_API_KEY }}
          CHANNELS_ENCRYPTION_SECRET: ${{ secrets.CHANNELS_ENCRYPTION_SECRET }}
          INTERNAL_SHARED_SECRET: ${{ secrets.INTERNAL_SHARED_SECRET }}
          CALL_ROOM_SECRET: ${{ secrets.CALL_ROOM_SECRET }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: JWT_SECRET"
            exit 1
          fi

          if [ -z "$AUTHENTIK_CLIENT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: AUTHENTIK_CLIENT_SECRET"
            exit 1
          fi

          if [ -z "$POSTGRES_USER" ]; then
            echo "::error::Missing required GitHub secret: POSTGRES_USER"
            exit 1
          fi

          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "::error::Missing required GitHub secret: POSTGRES_PASSWORD"
            exit 1
          fi

          # Regenerate .env from the template on every deploy so it stays ordered
          # like .env.example, drops stale keys, and never accumulates leftovers.
          # All real secrets are GitHub-backed and re-injected by the upserts below,
          # so nothing is lost; non-secret defaults come straight from the template.
          if [ ! -f infrastructure/.env.example ]; then
            echo "::error::infrastructure/.env.example is missing - cannot generate infrastructure/.env"
            exit 1
          fi
          cp infrastructure/.env.example infrastructure/.env

          upsert_env_var() {
            key="$1"
            value="$2"
            # Remove existing line (if any), then append.
            # Avoids sed delimiter issues with URLs containing '/'.
            grep -v "^${key}=" infrastructure/.env > infrastructure/.env.tmp || true
            mv infrastructure/.env.tmp infrastructure/.env
            printf '%s=%s\n' "$key" "$value" >> infrastructure/.env
          }

          upsert_env_var "JWT_SECRET" "$JWT_SECRET"

          if [ -n "$INTERNAL_SECRET" ]; then
            upsert_env_var "INTERNAL_SECRET" "$INTERNAL_SECRET"
          else
            echo "::warning::INTERNAL_SECRET is not set - social/form push notifications will be disabled"
          fi

          upsert_env_var "AUTHENTIK_BASE_URL" "$AUTHENTIK_BASE_URL"
          upsert_env_var "AUTHENTIK_CLIENT_ID" "$AUTHENTIK_CLIENT_ID"
          upsert_env_var "AUTHENTIK_CLIENT_SECRET" "$AUTHENTIK_CLIENT_SECRET"
          # SPA base URL → FRONTEND_URL (CORS pour core, social, chat-delivery, media).
          upsert_env_var "FRONTEND_URL" "$FRONTEND_URL"
          upsert_env_var "POSTGRES_USER" "$POSTGRES_USER"
          upsert_env_var "POSTGRES_PASSWORD" "$POSTGRES_PASSWORD"
          upsert_env_var "ALLOW_ORIGIN" "$FRONTEND_URL,http://localhost:1420"

          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            FIREBASE_SERVICE_ACCOUNT_JSON_COMPACT="$(printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" | tr -d '\r\n')"
            upsert_env_var "FIREBASE_SERVICE_ACCOUNT_JSON" "$FIREBASE_SERVICE_ACCOUNT_JSON_COMPACT"
          else
            echo "⚠️ FIREBASE_SERVICE_ACCOUNT_JSON is not set in GitHub secrets (push notifications will be disabled)"
          fi

          if [ -n "$STRIPE_SECRET_KEY" ]; then
            upsert_env_var "STRIPE_SECRET_KEY" "$STRIPE_SECRET_KEY"
          else
            echo "⚠️ STRIPE_SECRET_KEY is not set in GitHub secrets (payments features may be disabled)"
          fi

          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            upsert_env_var "STRIPE_WEBHOOK_SECRET" "$STRIPE_WEBHOOK_SECRET"
          else
            echo "⚠️ STRIPE_WEBHOOK_SECRET is not set in GitHub secrets (Stripe webhooks will be rejected in production)"
          fi

          if [ -n "$CLOUDFLARE_CALLS_API_TOKEN" ]; then
            upsert_env_var "CLOUDFLARE_CALLS_API_TOKEN" "$CLOUDFLARE_CALLS_API_TOKEN"
          else
            echo "::warning::CLOUDFLARE_CALLS_API_TOKEN is not set - voice/video calls will fail (ice-servers returns 503)"
          fi

          if [ -n "$CLOUDFLARE_TURN_KEY_ID" ]; then
            upsert_env_var "CLOUDFLARE_TURN_KEY_ID" "$CLOUDFLARE_TURN_KEY_ID"
          else
            echo "::warning::CLOUDFLARE_TURN_KEY_ID is not set - voice/video calls will fail (ice-servers returns 503)"
          fi

          if [ -n "$MINIO_ROOT_USER" ]; then
            upsert_env_var "MINIO_ROOT_USER" "$MINIO_ROOT_USER"
          else
            echo "::error::MINIO_ROOT_USER is not set - media storage will fail to start"
            exit 1
          fi

          if [ -n "$MINIO_ROOT_PASSWORD" ]; then
            upsert_env_var "MINIO_ROOT_PASSWORD" "$MINIO_ROOT_PASSWORD"
          else
            echo "::error::MINIO_ROOT_PASSWORD is not set - media storage will fail to start"
            exit 1
          fi

          # MINIO_ACCESS_KEY/SECRET_KEY are the S3 client credentials for media-service.
          # They mirror MINIO_ROOT_USER/ROOT_PASSWORD; written explicitly so that
          # Docker Compose does not need nested variable interpolation (not universally supported).
          upsert_env_var "MINIO_ACCESS_KEY" "$MINIO_ROOT_USER"
          upsert_env_var "MINIO_SECRET_KEY" "$MINIO_ROOT_PASSWORD"

          if [ -n "$MIGALLERY_API_KEY" ]; then
            upsert_env_var "MIGALLERY_API_KEY" "$MIGALLERY_API_KEY"
          else
            echo "::warning::MIGALLERY_API_KEY is not set - avatar service will not work"
          fi

          if [ -n "$CHANNELS_ENCRYPTION_SECRET" ]; then
            upsert_env_var "CHANNELS_ENCRYPTION_SECRET" "$CHANNELS_ENCRYPTION_SECRET"
          else
            echo "::error::CHANNELS_ENCRYPTION_SECRET is not set - channel encryption will fail"
            exit 1
          fi

          if [ -n "$INTERNAL_SHARED_SECRET" ]; then
            upsert_env_var "INTERNAL_SHARED_SECRET" "$INTERNAL_SHARED_SECRET"
          else
            echo "::error::INTERNAL_SHARED_SECRET is not set - inter-service HMAC auth will be disabled (security risk)"
            exit 1
          fi

          if [ -n "$CALL_ROOM_SECRET" ]; then
            upsert_env_var "CALL_ROOM_SECRET" "$CALL_ROOM_SECRET"
          else
            echo "::error::CALL_ROOM_SECRET is not set - WebRTC room access control will be disabled (security risk)"
            exit 1
          fi

          echo "✅ Runtime secrets synced to infrastructure/.env"

      - name: Check environment configuration
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "🔍 Checking environment configuration..."

          FRONTEND_HOST_PORT=80
          if [ -f infrastructure/.env ]; then
            ENV_PORT=$(grep -E '^FRONTEND_HOST_PORT=' infrastructure/.env | cut -d= -f2 || true)
            if [ -n "$ENV_PORT" ]; then
              FRONTEND_HOST_PORT="$ENV_PORT"
            fi
          fi
          echo "FRONTEND_HOST_PORT=$FRONTEND_HOST_PORT" >> $GITHUB_ENV

          if [ ! -f infrastructure/.env ]; then
            echo ""
            echo "╔═══════════════════════════════════════════════════════════╗"
            echo "║  ⚠️  CONFIGURATION MANQUANTE                             ║"
            echo "╚═══════════════════════════════════════════════════════════╝"
            echo ""
            echo "Le fichier infrastructure/.env n'existe pas."
            echo "Pour le premier déploiement, vous devez :"
            echo ""
            echo "  1. SSH sur le serveur :"
            echo "     ssh ${{ env.DEPLOY_PATH }}"
            echo ""
            echo "  2. Lancer la configuration initiale :"
            echo "     make production"
            echo ""
            echo "  3. Configurer les secrets dans infrastructure/.env"
            echo ""
            echo "  4. Relancer ce workflow"
            echo ""
            exit 1
          fi

          if [ ! -f frontend/.env ]; then
            echo "⚠️ frontend/.env manquant, création depuis template..."
            cp frontend/.env.example frontend/.env
          fi

          echo "✅ Configuration .env présente"

          # Vérifier que JWT_SECRET est configuré (sans afficher la valeur)
          if grep -q "^JWT_SECRET=.*change.*me" infrastructure/.env 2>/dev/null; then
            echo ""
            echo "⚠️  WARNING: JWT_SECRET semble être une valeur par défaut"
            echo "   Assurez-vous d'avoir configuré un secret sécurisé !"
            echo ""
          fi

      - name: Pull Docker images
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          CHANGED_SERVICES: ${{ needs.detect-changed-services.outputs.services_args }}
        run: |
          if [ -n "$CHANGED_SERVICES" ]; then
            echo "🔄 Pulling changed Docker images: $CHANGED_SERVICES"
            eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml pull $CHANGED_SERVICES"
            echo "✅ Changed images pulled successfully"
          else
            echo "ℹ️ No service image changes detected. Skipping docker pull."
          fi

      - name: Deploy services
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          echo "🚀 Deploying services with zero-downtime..."
          set +e
          eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml up -d --remove-orphans"
          DEPLOY_STATUS=$?
          set -e

          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "⚠️ First deploy attempt failed. Checking for frontend host port conflicts..."

            CONFLICTS=$(eval "$DOCKER_CLI ps --filter 'publish=$FRONTEND_HOST_PORT' --format '{{.ID}} {{.Image}} {{.Names}}'")

            NON_CANARI_CONFLICT=0
            if [ -n "$CONFLICTS" ]; then
              while IFS= read -r row; do
                [ -z "$row" ] && continue

                cid=$(echo "$row" | awk '{print $1}')
                image=$(echo "$row" | awk '{print $2}')
                name=$(echo "$row" | awk '{print $3}')

                if echo "$image" | grep -q "^${REGISTRY}/${IMAGE_PREFIX}/frontend:"; then
                  echo "🧹 Removing stale Canari frontend container using host port: $name ($cid)"
                  eval "$DOCKER_CLI rm -f $cid"
                else
                  echo "❌ Port conflict with non-Canari container: $name ($image)"
                  NON_CANARI_CONFLICT=1
                fi
              done <<< "$CONFLICTS"
            fi

            if [ "$NON_CANARI_CONFLICT" -ne 0 ]; then
              echo "Resolve host port ${FRONTEND_HOST_PORT} conflicts and retry deployment."
              exit 1
            fi

            echo "🔁 Retrying deployment after frontend cleanup..."
            eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml up -d --remove-orphans"
          fi

          echo "✅ Services deployed"

      - name: Deploy Authentik (miconnect) stack
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          MICONNECT_DIR: /home/canari/miconnect
          MICONNECT_PG_PASS: ${{ secrets.MICONNECT_PG_PASS }}
          MICONNECT_AUTHENTIK_SECRET_KEY: ${{ secrets.MICONNECT_AUTHENTIK_SECRET_KEY }}
        run: |
          echo "🔐 Deploying Authentik (miconnect) stack..."
          if [ -z "$MICONNECT_PG_PASS" ] || [ -z "$MICONNECT_AUTHENTIK_SECRET_KEY" ]; then
            echo "::error::MICONNECT_PG_PASS / MICONNECT_AUTHENTIK_SECRET_KEY manquants dans les secrets GitHub"
            exit 1
          fi

          # Montages locaux (bind) attendus par le compose Authentik.
          mkdir -p "$MICONNECT_DIR/data" "$MICONNECT_DIR/certs" "$MICONNECT_DIR/custom-templates"

          # Source de verite versionnee -> dossier de la stack (nom de projet "miconnect").
          cp infrastructure/authentik/compose.yml "$MICONNECT_DIR/compose.yml"

          # .env regenere depuis les secrets a chaque deploiement (comme la stack principale).
          {
            printf 'PG_PASS=%s\n' "$MICONNECT_PG_PASS"
            printf 'AUTHENTIK_SECRET_KEY=%s\n' "$MICONNECT_AUTHENTIK_SECRET_KEY"
          } > "$MICONNECT_DIR/.env"
          chmod 600 "$MICONNECT_DIR/.env"

          # Execute depuis le dossier pour conserver le nom de projet "miconnect"
          # et les conteneurs miconnect-* (idempotent: pas de recreation sans changement).
          ( cd "$MICONNECT_DIR" && eval "$DOCKER_COMPOSE up -d --remove-orphans" )
          echo "✅ Authentik deployed"

      - name: Run database migrations
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        run: |
          echo "🗄️ Running database migrations..."

          # Wait for PostgreSQL to accept connections (up to 60s).
          # psql and pg_isready connect via unix socket inside the container → trust auth, no password needed.
          for i in $(seq 1 30); do
            if eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T postgres pg_isready -U \"$POSTGRES_USER\" -d auth_db" >/dev/null 2>&1; then
              echo "✅ PostgreSQL is ready"
              break
            fi
            echo "⏳ Waiting for PostgreSQL... ($i/30)"
            sleep 2
            if [ "$i" -eq 30 ]; then
              echo "❌ PostgreSQL did not become ready in time"
              exit 1
            fi
          done

          # Run all *.sql files found under apps/*/src/migrations/, sorted by filename (001_, 002_, ...).
          # All migration files must be idempotent (use IF NOT EXISTS / ON CONFLICT DO NOTHING).
          MIGRATIONS=$(find apps/*/src/migrations -name "*.sql" 2>/dev/null | sort)

          if [ -z "$MIGRATIONS" ]; then
            echo "ℹ️ No migration files found - skipping"
          else
            for migration in $MIGRATIONS; do
              echo "▶️ Applying: $migration"
              eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T postgres \
                psql -U \"$POSTGRES_USER\" -d auth_db -v ON_ERROR_STOP=1" < "$migration"
              echo "✅ Done: $migration"
            done
          fi

          echo "✅ All migrations applied"

      - name: Verify runtime secrets are applied
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: JWT_SECRET"
            exit 1
          fi

          expected_jwt_sha=$(printf '%s' "$JWT_SECRET" | sha256sum | awk '{print $1}')
          core_jwt_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T core-service sh -lc 'printf %s \"$JWT_SECRET\" | sha256sum | awk \"{print \\\$1}\"'" || true)

          if [ -z "$core_jwt_sha" ] || [ "$core_jwt_sha" != "$expected_jwt_sha" ]; then
            echo "::error::JWT_SECRET is not correctly applied in core-service"
            exit 1
          fi

          delivery_has_jwt=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T chat-delivery-service sh -lc 'test -n \"$JWT_SECRET\" && echo yes || echo no'" || true)
          if [ "$delivery_has_jwt" != "yes" ]; then
            echo "::error::JWT_SECRET is not present in chat-delivery-service"
            exit 1
          fi

          if [ -n "$STRIPE_SECRET_KEY" ]; then
            expected_stripe_sha=$(printf '%s' "$STRIPE_SECRET_KEY" | sha256sum | awk '{print $1}')
            core_stripe_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T core-service sh -lc 'printf %s \"$STRIPE_SECRET_KEY\" | sha256sum | awk \"{print \\\$1}\"'" || true)
            social_stripe_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T social-service sh -lc 'printf %s \"$STRIPE_SECRET_KEY\" | sha256sum | awk \"{print \\\$1}\"'" || true)

            if [ -z "$core_stripe_sha" ] || [ "$core_stripe_sha" != "$expected_stripe_sha" ]; then
              echo "::error::STRIPE_SECRET_KEY is not correctly applied in core-service"
              exit 1
            fi
            if [ -z "$social_stripe_sha" ] || [ "$social_stripe_sha" != "$expected_stripe_sha" ]; then
              echo "::error::STRIPE_SECRET_KEY is not correctly applied in social-service"
              exit 1
            fi
          fi

          if [ -n "$STRIPE_WEBHOOK_SECRET" ]; then
            expected_webhook_sha=$(printf '%s' "$STRIPE_WEBHOOK_SECRET" | sha256sum | awk '{print $1}')
            core_webhook_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T core-service sh -lc 'printf %s \"$STRIPE_WEBHOOK_SECRET\" | sha256sum | awk \"{print \\\$1}\"'" || true)

            if [ -z "$core_webhook_sha" ] || [ "$core_webhook_sha" != "$expected_webhook_sha" ]; then
              echo "::error::STRIPE_WEBHOOK_SECRET is not correctly applied in core-service"
              exit 1
            fi
          fi

          echo "✅ Runtime secrets are applied in containers"

      - name: Wait for services to be healthy
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "⏳ Waiting for critical services to be running..."
          critical_services=(
            chat-gateway
            call-service
            chat-delivery-service
            media-service
            core-service
            social-service
            frontend
          )

          ready=0
          for _ in {1..36}; do
            running_services=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --status running --services" || true)
            ps_all=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --all" || true)

            if echo "$ps_all" | grep -E "(chat-gateway|call-service|chat-delivery-service|media-service|core-service|social-service|frontend)" | grep -E "Restarting|Exit|Dead|unhealthy" >/dev/null; then
              echo "❌ One or more critical services are unhealthy/restarting/exited"
              echo "$ps_all"
              exit 1
            fi

            missing=0
            for service in "${critical_services[@]}"; do
              if ! echo "$running_services" | grep -qx "$service"; then
                missing=1
                break
              fi
            done

            if [ "$missing" -eq 0 ]; then
              ready=1
              break
            fi

            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "❌ Timeout waiting for critical services"
            eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --all"
            exit 1
          fi

          echo "✅ Critical services are running"

      - name: Cleanup old resources
        run: |
          echo "🧹 Cleaning up old Docker resources..."
          eval "$DOCKER_CLI image prune -af --filter 'until=24h'"
          eval "$DOCKER_CLI container prune -f"
          echo "✅ Cleanup completed"

      - name: Display running services
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "📊 Currently running services:"
          eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🔗 Application URL: https://${{ env.DOMAIN }}"
          echo "📦 Deployed commit: ${{ github.sha }}"

      - name: Health Check
        run: |
          echo "🔍 Performing health checks..."
          sleep 5

          FRONTEND_HOST_PORT="${FRONTEND_HOST_PORT:-8080}"

          retry_http() {
            local label="$1"
            local expected_regex="$2"
            local cmd="$3"
            local attempts="${4:-12}"
            local delay="${5:-3}"
            local status="000"

            for _ in $(seq 1 "$attempts"); do
              status=$(eval "$cmd" || true)
              if echo "$status" | grep -Eq "$expected_regex"; then
                echo "✅ ${label} (HTTP ${status})"
                return 0
              fi
              sleep "$delay"
            done

            echo "❌ ${label} failed after ${attempts} attempts (last HTTP ${status})"
            return 1
          }

          # Check frontend (local host port)
          retry_http \
            "frontend health check" \
            "^(2|3)[0-9][0-9]$" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${FRONTEND_HOST_PORT}/"

          # Check chat-delivery-service via Nginx (dedicated anonymous liveness route).
          retry_http \
            "chat-delivery-service health check" \
            "^200$" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${FRONTEND_HOST_PORT}/api/chat-delivery-health"

          # Check media-service TCP/HTTP reachability via Nginx (status may be 2xx/4xx depending on route).
          retry_http \
            "media-service reachability check" \
            "^[1-5][0-9][0-9]$" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${FRONTEND_HOST_PORT}/api/media"

          echo "✅ Health checks completed"

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to production succeeded"
          else
            echo "❌ Deployment to production failed"
          fi
