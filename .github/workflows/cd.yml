name: CD - Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Permet déclenchement manuel

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  DOMAIN: canari-emse.fr
  DEPLOY_PATH: /home/canari/canari

jobs:
  run-ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  run-code-analysis:
    name: Run Code Analysis
    uses: ./.github/workflows/code-analysis.yml

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install
          bunx svelte-kit sync

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM
        working-directory: frontend/mls-wasm
        run: wasm-pack build --target web --out-dir ../src/lib/wasm

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate frontend build secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: JWT_SECRET"
            exit 1
          fi
          if [ -z "$BASE_URL" ]; then
            echo "::error::Missing required GitHub secret: BASE_URL"
            exit 1
          fi

      - name: Create frontend .env with JWT_SECRET
        working-directory: frontend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo "VITE_JWT_SECRET=${JWT_SECRET}" > .env
          # VITE_GATEWAY_URL et VITE_DELIVERY_URL intentionnellement vides :
          # le code utilise window.location.origin comme fallback, ce qui fonctionne
          # derrière nginx (même domaine, /ws, /mls-api/ et /media/ routés par le reverse proxy).
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_CHANNEL_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_POST_URL=${BASE_URL}" >> .env
          echo "VITE_FORM_URL=${BASE_URL}" >> .env

      - name: Build frontend
        working-directory: frontend
        run: bun run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  build-docker-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: core-service
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.core-service
          - name: social-service
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.social-service
          - name: call-service
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.call-service
          - name: chat-gateway
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.chat-gateway
          - name: chat-delivery-service
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.chat-delivery-service
          - name: frontend
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.frontend
          - name: media-service
            context: .
            dockerfile: ./infrastructure/local/Dockerfile.media-service
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        if: matrix.service.name == 'frontend'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  deploy-to-server:
    name: Deploy to Production Server
    runs-on: self-hosted
    needs: [run-ci, run-code-analysis, build-docker-images]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://${{ env.DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - name: Log deployment start
        run: |
          echo "🚀 Starting deployment on self-hosted runner..."
          echo "User: $(whoami)"
          echo "Working directory: $(pwd)"
          echo "Deploy path: ${{ env.DEPLOY_PATH }}"

      - name: Setup environment variables
        run: |
          echo "REGISTRY=${{ env.REGISTRY }}" >> $GITHUB_ENV
          echo "IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}" >> $GITHUB_ENV
          echo "TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Resolve Docker access
        run: |
          if docker info >/dev/null 2>&1; then
            echo "DOCKER_CLI=docker" >> $GITHUB_ENV
            echo "DOCKER_COMPOSE=docker compose" >> $GITHUB_ENV
            echo "✅ Docker access available via docker"
          elif sudo -n docker info >/dev/null 2>&1; then
            echo "DOCKER_CLI=sudo docker" >> $GITHUB_ENV
            echo "DOCKER_COMPOSE=sudo docker compose" >> $GITHUB_ENV
            echo "✅ Docker access available via sudo docker"
          else
            echo "❌ Cannot access Docker daemon as current runner user"
            id
            ls -l /var/run/docker.sock || true
            echo "Runner user must be in docker group or have passwordless sudo for docker"
            exit 1
          fi

      - name: Authenticate to GHCR
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          echo "🔐 Logging into GHCR..."
          if [ "$DOCKER_CLI" = "docker" ]; then
            echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
          else
            echo "$GHCR_TOKEN" | sudo docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
          fi
          echo "✅ GHCR authentication successful"

      - name: Navigate to deployment directory
        run: |
          cd ${{ env.DEPLOY_PATH }}
          echo "📂 Current directory: $(pwd)"

      - name: Pull latest code
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "📥 Updating repository..."
          git fetch origin
          git reset --hard origin/main
          echo "✅ Code updated to $(git rev-parse --short HEAD)"

      - name: Sync runtime secrets into infrastructure/.env
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: JWT_SECRET"
            exit 1
          fi

          if [ ! -f infrastructure/.env ]; then
            if [ -f infrastructure/.env.example ]; then
              cp infrastructure/.env.example infrastructure/.env
            else
              echo "::error::infrastructure/.env and infrastructure/.env.example are both missing"
              exit 1
            fi
          fi

          upsert_env_var() {
            key="$1"
            value="$2"
            escaped_value=$(printf '%s' "$value" | sed -e 's/[\\/&]/\\\\&/g')

            if grep -q "^${key}=" infrastructure/.env; then
              sed -i "s/^${key}=.*/${key}=${escaped_value}/" infrastructure/.env
            else
              printf "\n%s=%s\n" "$key" "$value" >> infrastructure/.env
            fi
          }

          upsert_env_var "JWT_SECRET" "$JWT_SECRET"

          if [ -n "$STRIPE_SECRET_KEY" ]; then
            upsert_env_var "STRIPE_SECRET_KEY" "$STRIPE_SECRET_KEY"
          else
            echo "⚠️ STRIPE_SECRET_KEY is not set in GitHub secrets (payments features may be disabled)"
          fi

          echo "✅ Runtime secrets synced to infrastructure/.env"

      - name: Check environment configuration
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "🔍 Checking environment configuration..."

          FRONTEND_HOST_PORT=8080
          if [ -f infrastructure/.env ]; then
            ENV_PORT=$(grep -E '^FRONTEND_HOST_PORT=' infrastructure/.env | cut -d= -f2 || true)
            if [ -n "$ENV_PORT" ]; then
              FRONTEND_HOST_PORT="$ENV_PORT"
            fi
          fi
          echo "FRONTEND_HOST_PORT=$FRONTEND_HOST_PORT" >> $GITHUB_ENV

          if [ ! -f infrastructure/.env ]; then
            echo ""
            echo "╔═══════════════════════════════════════════════════════════╗"
            echo "║  ⚠️  CONFIGURATION MANQUANTE                             ║"
            echo "╚═══════════════════════════════════════════════════════════╝"
            echo ""
            echo "Le fichier infrastructure/.env n'existe pas."
            echo "Pour le premier déploiement, vous devez :"
            echo ""
            echo "  1. SSH sur le serveur :"
            echo "     ssh ${{ env.DEPLOY_PATH }}"
            echo ""
            echo "  2. Lancer la configuration initiale :"
            echo "     make production"
            echo ""
            echo "  3. Configurer les secrets dans infrastructure/.env"
            echo ""
            echo "  4. Relancer ce workflow"
            echo ""
            exit 1
          fi

          if [ ! -f frontend/.env ]; then
            echo "⚠️ frontend/.env manquant, création depuis template..."
            cp frontend/.env.example frontend/.env
          fi

          echo "✅ Configuration .env présente"

          # Vérifier que JWT_SECRET est configuré (sans afficher la valeur)
          if grep -q "^JWT_SECRET=.*change.*me" infrastructure/.env 2>/dev/null; then
            echo ""
            echo "⚠️  WARNING: JWT_SECRET semble être une valeur par défaut"
            echo "   Assurez-vous d'avoir configuré un secret sécurisé !"
            echo ""
          fi

      - name: Pull Docker images
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          TAG: ${{ github.sha }}
        run: |
          echo "🔄 Pulling Docker images..."
          eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml pull"
          echo "✅ Images pulled successfully"

      - name: Deploy services
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          TAG: ${{ github.sha }}
        run: |
          echo "🚀 Deploying services with zero-downtime..."
          set +e
          eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml up -d --remove-orphans"
          DEPLOY_STATUS=$?
          set -e

          if [ "$DEPLOY_STATUS" -ne 0 ]; then
            echo "⚠️ First deploy attempt failed. Checking for frontend host port conflicts..."

            CONFLICTS=$(eval "$DOCKER_CLI ps --filter 'publish=$FRONTEND_HOST_PORT' --format '{{.ID}} {{.Image}} {{.Names}}'")

            NON_CANARI_CONFLICT=0
            if [ -n "$CONFLICTS" ]; then
              while IFS= read -r row; do
                [ -z "$row" ] && continue

                cid=$(echo "$row" | awk '{print $1}')
                image=$(echo "$row" | awk '{print $2}')
                name=$(echo "$row" | awk '{print $3}')

                if echo "$image" | grep -q "^${REGISTRY}/${IMAGE_PREFIX}/frontend:"; then
                  echo "🧹 Removing stale Canari frontend container using host port: $name ($cid)"
                  eval "$DOCKER_CLI rm -f $cid"
                else
                  echo "❌ Port conflict with non-Canari container: $name ($image)"
                  NON_CANARI_CONFLICT=1
                fi
              done <<< "$CONFLICTS"
            fi

            if [ "$NON_CANARI_CONFLICT" -ne 0 ]; then
              echo "Resolve host port ${FRONTEND_HOST_PORT} conflicts and retry deployment."
              exit 1
            fi

            echo "🔁 Retrying deployment after frontend cleanup..."
            eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml up -d --remove-orphans"
          fi

          echo "✅ Services deployed"

      - name: Verify runtime secrets are applied
        working-directory: ${{ env.DEPLOY_PATH }}
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "::error::Missing required GitHub secret: JWT_SECRET"
            exit 1
          fi

          expected_jwt_sha=$(printf '%s' "$JWT_SECRET" | sha256sum | awk '{print $1}')
          core_jwt_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T core-service sh -lc 'printf %s \"$JWT_SECRET\" | sha256sum | awk \"{print \\\$1}\"'" || true)

          if [ -z "$core_jwt_sha" ] || [ "$core_jwt_sha" != "$expected_jwt_sha" ]; then
            echo "::error::JWT_SECRET is not correctly applied in core-service"
            exit 1
          fi

          delivery_has_jwt=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T chat-delivery-service sh -lc 'test -n \"$JWT_SECRET\" && echo yes || echo no'" || true)
          if [ "$delivery_has_jwt" != "yes" ]; then
            echo "::error::JWT_SECRET is not present in chat-delivery-service"
            exit 1
          fi

          if [ -n "$STRIPE_SECRET_KEY" ]; then
            expected_stripe_sha=$(printf '%s' "$STRIPE_SECRET_KEY" | sha256sum | awk '{print $1}')
            core_stripe_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T core-service sh -lc 'printf %s \"$STRIPE_SECRET_KEY\" | sha256sum | awk \"{print \\\$1}\"'" || true)
            social_stripe_sha=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml exec -T social-service sh -lc 'printf %s \"$STRIPE_SECRET_KEY\" | sha256sum | awk \"{print \\\$1}\"'" || true)

            if [ -z "$core_stripe_sha" ] || [ "$core_stripe_sha" != "$expected_stripe_sha" ]; then
              echo "::error::STRIPE_SECRET_KEY is not correctly applied in core-service"
              exit 1
            fi
            if [ -z "$social_stripe_sha" ] || [ "$social_stripe_sha" != "$expected_stripe_sha" ]; then
              echo "::error::STRIPE_SECRET_KEY is not correctly applied in social-service"
              exit 1
            fi
          fi

          echo "✅ Runtime secrets are applied in containers"

      - name: Wait for services to be healthy
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "⏳ Waiting for critical services to be running..."
          critical_services=(
            chat-gateway
            call-service
            chat-delivery-service
            media-service
            core-service
            social-service
            frontend
          )

          ready=0
          for _ in {1..36}; do
            running_services=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --status running --services" || true)
            ps_all=$(eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --all" || true)

            if echo "$ps_all" | grep -E "(chat-gateway|call-service|chat-delivery-service|media-service|core-service|social-service|frontend)" | grep -E "Restarting|Exit|Dead|unhealthy" >/dev/null; then
              echo "❌ One or more critical services are unhealthy/restarting/exited"
              echo "$ps_all"
              exit 1
            fi

            missing=0
            for service in "${critical_services[@]}"; do
              if ! echo "$running_services" | grep -qx "$service"; then
                missing=1
                break
              fi
            done

            if [ "$missing" -eq 0 ]; then
              ready=1
              break
            fi

            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "❌ Timeout waiting for critical services"
            eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps --all"
            exit 1
          fi

          echo "✅ Critical services are running"

      - name: Cleanup old resources
        run: |
          echo "🧹 Cleaning up old Docker resources..."
          eval "$DOCKER_CLI image prune -af --filter 'until=24h'"
          eval "$DOCKER_CLI container prune -f"
          echo "✅ Cleanup completed"

      - name: Display running services
        working-directory: ${{ env.DEPLOY_PATH }}
        run: |
          echo "📊 Currently running services:"
          eval "$DOCKER_COMPOSE -f infrastructure/docker-compose.prod.yml ps"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🔗 Application URL: https://${{ env.DOMAIN }}"
          echo "📦 Deployed commit: ${{ github.sha }}"

      - name: Health Check
        run: |
          echo "🔍 Performing health checks..."
          sleep 5

          FRONTEND_HOST_PORT="${FRONTEND_HOST_PORT:-8080}"

          retry_http() {
            local label="$1"
            local expected_regex="$2"
            local cmd="$3"
            local attempts="${4:-12}"
            local delay="${5:-3}"
            local status="000"

            for _ in $(seq 1 "$attempts"); do
              status=$(eval "$cmd" || true)
              if echo "$status" | grep -Eq "$expected_regex"; then
                echo "✅ ${label} (HTTP ${status})"
                return 0
              fi
              sleep "$delay"
            done

            echo "❌ ${label} failed after ${attempts} attempts (last HTTP ${status})"
            return 1
          }

          # Check frontend (local host port)
          retry_http \
            "frontend health check" \
            "^(2|3)[0-9][0-9]$" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:${FRONTEND_HOST_PORT}/"

          # Check chat-delivery-service reachability on MLS endpoint.
          # 400 is expected here because verifier format is intentionally invalid.
          retry_http \
            "chat-delivery-service MLS health check" \
            "^(200|400)$" \
            "curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:3010/api/mls-api/pin-verifier/check -H 'Content-Type: application/json' -d '{\"userId\":\"healthcheck\",\"verifier\":\"invalid\"}'"

          # Check media-service TCP/HTTP reachability (status may be 2xx/4xx depending on route).
          retry_http \
            "media-service reachability check" \
            "^[1-5][0-9][0-9]$" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3011/api/media"

          echo "✅ Health checks completed"

      - name: Notify deployment
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to production succeeded"
          else
            echo "❌ Deployment to production failed"
          fi
