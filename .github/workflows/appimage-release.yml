name: AppImage Release

# Runs after "Bump version on release" syncs frontend/package.json on main.
on:
  workflow_run:
    workflows: ['Bump version on release']
    types: [completed]
  workflow_dispatch:

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Resolve release tag
        id: release_tag
        run: |
          VERSION="$(bash scripts/read-app-version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Canari v${VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx svelte-kit sync

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate required secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          required=(BASE_URL AUTHENTIK_URL AUTHENTIK_CLIENT_ID)
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done
          echo "✅ Required secrets are present"

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env
          echo "VITE_AUTHENTIK_REDIRECT_URI=http://localhost:1421/auth/callback" >> .env

      - name: Build Tauri AppImage
        working-directory: frontend
        run: bun tauri build --bundles appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: canari-linux-appimage
          path: frontend/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'workflow_run'
        with:
          tag_name: v${{ steps.release_tag.outputs.version }}
          fail_on_unmatched_files: true
          files: frontend/src-tauri/target/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
