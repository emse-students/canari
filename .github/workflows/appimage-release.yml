name: AppImage Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
            frontend/mls-core/target
            frontend/mls-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock', 'frontend/mls-core/Cargo.lock', 'frontend/mls-wasm/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install
          bunx svelte-kit sync

      - name: Build WASM
        working-directory: frontend/mls-wasm
        run: wasm-pack build --target web --out-dir ../src/lib/wasm

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate required secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          required=(
            BASE_URL
            AUTHENTIK_URL
            AUTHENTIK_CLIENT_ID
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          echo "✅ Required secrets are present"

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          # Use empty values for URLs to trigger fallback to window.location logic (or defaults)
          # Or set specific production URLs here if desired.
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | base64 -d | gpg2 --batch --import

      - name: Build Tauri AppImage
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_BASE_URL: ${{ secrets.BASE_URL }}
          PUBLIC_AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          PUBLIC_AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          SIGN: ${{ secrets.GPG_PRIVATE_KEY != '' && '1' || '0' }}
          SIGN_KEY: ${{ secrets.GPG_KEY_ID }}
          APPIMAGETOOL_SIGN_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          APPIMAGETOOL_FORCE_SIGN: 1
        with:
          projectPath: frontend
          args: --target x86_64-unknown-linux-gnu
          releaseId: ${{ github.event.release.id }}

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: canari-appimage
          path: frontend/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          files: frontend/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
