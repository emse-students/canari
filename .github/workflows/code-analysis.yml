name: Code Analysis

on:
  pull_request:
    branches:
      - main
  schedule:
    # Daily analysis at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_call:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended, security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified
        continue-on-error: true
  dependencies:
    name: Check Dependencies Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Audit frontend dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit auth-service dependencies
        run: |
          cd apps/auth-service
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit chat-delivery-service dependencies
        run: |
          cd apps/chat-delivery-service
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit user-service dependencies
        run: |
          cd apps/user-service
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check Cargo dependencies
        run: cargo install cargo-audit && cargo audit
        continue-on-error: true
