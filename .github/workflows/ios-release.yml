name: iOS Release

# Mirrors android-release.yml: runs after "Bump version on release" syncs
# frontend/package.json on main, and attaches the signed .ipa to the GitHub Release.
# Public repo => GitHub-hosted macOS runners are free.
on:
  workflow_run:
    workflows: ['Bump version on release']
    types: [completed]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-15 # Xcode 16.2+ (required for current iOS SDK / Tauri toolchain)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Resolve release tag
        id: release_tag
        run: |
          VERSION="$(bash scripts/read-app-version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Canari v${VERSION}"

      - name: Select Xcode (>= 16.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '>=16.2.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx svelte-kit sync

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate iOS release secrets
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_NSE: ${{ secrets.APPLE_PROVISIONING_PROFILE_NSE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          # Two provisioning profiles are required because the project signs two bundles
          # manually: the app (fr.emse.canari, profile "Canari") and the Notification
          # Service Extension (fr.emse.canari.notifications, profile "CanariNotifications").
          required=(
            APPLE_SIGNING_IDENTITY
            APPLE_CERTIFICATE_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_PROVISIONING_PROFILE
            APPLE_PROVISIONING_PROFILE_NSE
            APPLE_TEAM_ID
            GOOGLE_SERVICE_INFO_PLIST
            JWT_SECRET
            BASE_URL
            AUTHENTIK_URL
            AUTHENTIK_CLIENT_ID
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          echo "✅ Required iOS secrets are present"

      - name: Install Apple signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Créer un keychain temporaire
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Décoder et importer le certificat
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "✅ Signing certificate installed"

      - name: Install provisioning profiles
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_NSE: ${{ secrets.APPLE_PROVISIONING_PROFILE_NSE }}
        run: |
          # Install BOTH profiles into the runner's profile store. xcodebuild resolves the
          # PROVISIONING_PROFILE_SPECIFIER names ("Canari", "CanariNotifications") set in
          # the project by scanning these installed profiles, so both must be present.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          install_profile() {
            local b64="$1"
            local label="$2"
            local tmp="$RUNNER_TEMP/${label}.mobileprovision"
            echo "$b64" | base64 --decode > "$tmp"
            local uuid
            uuid=$(security cms -D -i "$tmp" | plutil -extract UUID raw -)
            local name
            name=$(security cms -D -i "$tmp" | plutil -extract Name raw -)
            cp "$tmp" "$PROFILES_DIR/$uuid.mobileprovision"
            echo "✅ Installed profile '$name' (UUID: $uuid) for $label"
          }

          install_profile "$APPLE_PROVISIONING_PROFILE" "app"
          install_profile "$APPLE_PROVISIONING_PROFILE_NSE" "nse"

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          # Must match the pbxproj file reference path (canari_iOS/GoogleService-Info.plist,
          # lowercase to match the on-disk group folder) so Xcode bundles it and
          # [FIRApp configure] finds it at launch. printf (not echo) preserves the
          # exact XML without interpreting backslashes or appending a stray newline.
          PLIST_DIR="frontend/src-tauri/gen/apple/canari_iOS"
          mkdir -p "$PLIST_DIR"
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > "$PLIST_DIR/GoogleService-Info.plist"
          echo "✅ GoogleService-Info.plist written to $PLIST_DIR"

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}
          IOS_APP_STORE_URL: ${{ vars.VITE_IOS_APP_STORE_URL }}
        run: |
          # Same variable set as android-release.yml: the SvelteKit frontend is shared,
          # so it needs the identical build-time config (Authentik SSO included).
          echo "VITE_FRONTEND_URL=${BASE_URL}" > .env
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env
          echo "VITE_CALL_E2E_ENCRYPTION=false" >> .env
          if [ -n "$KLIPY_API_KEY" ]; then
            echo "VITE_KLIPY_KEY=${KLIPY_API_KEY}" >> .env
          fi
          # App Store deep link for the in-app "update" prompt. Empty until the listing
          # is live (repo variable VITE_IOS_APP_STORE_URL); while empty the iOS prompt
          # stays hidden (no sideload fallback), so it never shows a dead action.
          if [ -n "$IOS_APP_STORE_URL" ]; then
            echo "VITE_IOS_APP_STORE_URL=${IOS_APP_STORE_URL}" >> .env
          fi

      - name: Verify frontend env for iOS build
        working-directory: frontend
        run: |
          grep -q '^VITE_FRONTEND_URL=.' .env
          grep -q '^VITE_GATEWAY_URL=.' .env
          grep -q '^VITE_DELIVERY_URL=.' .env
          grep -q '^VITE_MEDIA_URL=.' .env
          grep -q '^VITE_CALL_URL=.' .env
          grep -q '^VITE_SOCIAL_URL=.' .env
          grep -q '^VITE_CORE_URL=.' .env
          grep -q '^VITE_AUTHENTIK_URL=.' .env
          grep -q '^VITE_AUTHENTIK_CLIENT_ID=.' .env
          echo "✅ iOS frontend env prepared"

      - name: Resolve Swift Packages
        working-directory: frontend/src-tauri/gen/apple
        run: xcodebuild -resolvePackageDependencies -project canari.xcodeproj -scheme canari_iOS

      - name: Prebuild Rust static lib (libapp.a)
        working-directory: frontend/src-tauri
        env:
          # Match the lowest pbxproj IPHONEOS_DEPLOYMENT_TARGET (14.0). Without it,
          # rustc/cc default the objects' min-iOS to the SDK version, and every link
          # pass floods "object file built for newer iOS version than being linked"
          # (~75 ld warnings per run).
          IPHONEOS_DEPLOYMENT_TARGET: "14.0"
        run: |
          # The Xcode "Build Rust Code" phase is disabled in the hand-maintained pbxproj
          # (it shells out to bun, which isn't on Xcode's PATH), and Externals/ is
          # gitignored - so a clean checkout has no libapp.a and both the app AND the NSE
          # fail to link with `ld: library 'app' not found`. Reproduce what Tauri's
          # xcode-script does: cross-compile the app staticlib and drop it where the
          # linker search path (Externals/<arch>/<config>) expects it, as `libapp.a`.
          # rust-toolchain.toml pins 1.93.0 (no `targets`), which overrides the action's
          # `stable` here - so the iOS std isn't installed for the toolchain cargo actually
          # uses. Add it to the pinned toolchain (override is active in this dir).
          rustup target add aarch64-apple-ios
          cargo build --lib --release --target aarch64-apple-ios
          LIB=$(find target/aarch64-apple-ios/release -maxdepth 1 -name 'libmines_app_lib.a' | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::libmines_app_lib.a not produced by cargo"
            exit 1
          fi
          DEST=gen/apple/Externals/arm64/release
          mkdir -p "$DEST"
          cp "$LIB" "$DEST/libapp.a"
          echo "✅ libapp.a staged at $DEST ($(du -h "$DEST/libapp.a" | cut -f1))"

      - name: Build iOS archive
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Tauri archives the app + embedded NSE with the manual profiles from the
          # pbxproj (PROVISIONING_PROFILE_SPECIFIER = Canari / CanariNotifications), which
          # succeeds. Its OWN -exportArchive then fails ("requires a provisioning profile
          # with the App Groups... features") because the ExportOptions.plist Tauri
          # generates can't express a two-target (app + appex) manual-signing profile map,
          # so xcodebuild falls back to automatic signing on export. We tolerate that
          # failure here and export the archive ourselves in the next step. The archive is
          # already produced and correctly signed before export runs, so this loses
          # nothing; a genuine archive failure is caught by the "no .xcarchive" guard.
          bun tauri ios build --export-method app-store-connect -v || \
            echo "::warning::tauri export failed (expected with two manual profiles); exporting archive manually"

      - name: Export signed IPA
        id: outputs
        working-directory: frontend/src-tauri/gen/apple
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Re-export the archive Tauri produced with an ExportOptions.plist that pins
          # manual signing and maps EACH bundle id to its named distribution profile, the
          # part Tauri's generated options omit. Both profiles are already installed in the
          # runner store (by name) and carry the required entitlements (App Groups,
          # Associated Domains, aps-environment).
          ARCHIVE=$(find build -name '*.xcarchive' -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::No .xcarchive produced by the iOS archive step"
            find build -maxdepth 3 -type d || true
            exit 1
          fi
          echo "Archive: $ARCHIVE"

          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>fr.emse.canari</key>
              <string>Canari</string>
              <key>fr.emse.canari.notifications</key>
              <string>CanariNotifications</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

          IPA=$(find build/ipa -name '*.ipa' | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::exportArchive produced no .ipa"
            exit 1
          fi
          echo "ipa=frontend/src-tauri/gen/apple/$IPA" >> "$GITHUB_OUTPUT"
          echo "IPA: $IPA"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: ${{ steps.outputs.outputs.ipa }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'workflow_run'
        with:
          tag_name: v${{ steps.release_tag.outputs.version }}
          fail_on_unmatched_files: true
          files: ${{ steps.outputs.outputs.ipa }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to TestFlight / App Store Connect
        if: github.event_name == 'workflow_run'
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          IPA_PATH: ${{ steps.outputs.outputs.ipa }}
        run: |
          # Pushes the App-Store-signed .ipa to App Store Connect (lands in TestFlight).
          # A raw .ipa cannot be sideloaded from a GitHub Release on iOS, so this is the
          # only real distribution path. The step SKIPS (does not fail) until the three
          # App Store Connect API-key secrets exist, so the build/release stays green in
          # the meantime.
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_API_KEY_P8" ]; then
            echo "::warning::App Store Connect API key secrets not set; skipping TestFlight upload"
            exit 0
          fi
          # altool auto-discovers the key at ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY_P8" | base64 --decode > "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"
          echo "Uploading ${IPA_PATH} to App Store Connect…"

          ALTOOL_LOG="$(mktemp)"
          set +e
          xcrun altool --upload-app -f "$IPA_PATH" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" > "$ALTOOL_LOG" 2>&1
          ALTOOL_EXIT=$?
          set -e
          cat "$ALTOOL_LOG"
          rm -f "$KEY_DIR/AuthKey_${ASC_KEY_ID}.p8"

          # altool can exit 0 even when its own payload reports a failed upload (e.g. an
          # asset-validation rejection), so the process exit code alone cannot be trusted -
          # also grep the transcript for altool's own failure markers.
          if [ "$ALTOOL_EXIT" -ne 0 ] || grep -qiE "UPLOAD FAILED|Error Domain=|VALIDATION_ERROR|NSLocalizedDescription" "$ALTOOL_LOG"; then
            echo "::error::altool reported a failed upload - see log above"
            exit 1
          fi
          echo "✅ Uploaded to TestFlight"
