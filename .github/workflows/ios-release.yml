name: iOS Release

# Mirrors android-release.yml: runs after "Bump version on release" syncs
# frontend/package.json on main, and attaches the signed .ipa to the GitHub Release.
# Public repo => GitHub-hosted macOS runners are free.
on:
  workflow_run:
    workflows: ['Bump version on release']
    types: [completed]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: macos-15 # Xcode 16.2+ (required for current iOS SDK / Tauri toolchain)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Resolve release tag
        id: release_tag
        run: |
          VERSION="$(bash scripts/read-app-version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Canari v${VERSION}"

      - name: Select Xcode (>= 16.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '>=16.2.0'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Cache Bun dependencies
        uses: actions/cache@v6
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx svelte-kit sync

      - name: Generate protobuf bindings
        working-directory: frontend
        run: bun run proto:gen

      - name: Validate iOS release secrets
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_NSE: ${{ secrets.APPLE_PROVISIONING_PROFILE_NSE }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
        run: |
          # Two provisioning profiles are required because the project signs two bundles
          # manually: the app (fr.emse.canari, profile "Canari") and the Notification
          # Service Extension (fr.emse.canari.notifications, profile "CanariNotifications").
          required=(
            APPLE_SIGNING_IDENTITY
            APPLE_CERTIFICATE_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_PROVISIONING_PROFILE
            APPLE_PROVISIONING_PROFILE_NSE
            APPLE_TEAM_ID
            GOOGLE_SERVICE_INFO_PLIST
            JWT_SECRET
            BASE_URL
            AUTHENTIK_URL
            AUTHENTIK_CLIENT_ID
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

          echo "✅ Required iOS secrets are present"

      - name: Install Apple signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Créer un keychain temporaire
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Décoder et importer le certificat
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "✅ Signing certificate installed"

      - name: Install provisioning profiles
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_PROVISIONING_PROFILE_NSE: ${{ secrets.APPLE_PROVISIONING_PROFILE_NSE }}
        run: |
          # Install BOTH profiles into the runner's profile store. xcodebuild resolves the
          # PROVISIONING_PROFILE_SPECIFIER names ("Canari", "CanariNotifications") set in
          # the project by scanning these installed profiles, so both must be present.
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          install_profile() {
            local b64="$1"
            local label="$2"
            local tmp="$RUNNER_TEMP/${label}.mobileprovision"
            echo "$b64" | base64 --decode > "$tmp"
            local uuid
            uuid=$(security cms -D -i "$tmp" | plutil -extract UUID raw -)
            local name
            name=$(security cms -D -i "$tmp" | plutil -extract Name raw -)
            cp "$tmp" "$PROFILES_DIR/$uuid.mobileprovision"
            echo "✅ Installed profile '$name' (UUID: $uuid) for $label"
          }

          install_profile "$APPLE_PROVISIONING_PROFILE" "app"
          install_profile "$APPLE_PROVISIONING_PROFILE_NSE" "nse"

      - name: Write GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          # Must match the pbxproj file reference path (canari_iOS/GoogleService-Info.plist,
          # lowercase to match the on-disk group folder) so Xcode bundles it and
          # [FIRApp configure] finds it at launch. printf (not echo) preserves the
          # exact XML without interpreting backslashes or appending a stray newline.
          PLIST_DIR="frontend/src-tauri/gen/apple/canari_iOS"
          mkdir -p "$PLIST_DIR"
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > "$PLIST_DIR/GoogleService-Info.plist"
          echo "✅ GoogleService-Info.plist written to $PLIST_DIR"

      - name: Create frontend .env
        working-directory: frontend
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTHENTIK_URL: ${{ secrets.AUTHENTIK_URL }}
          AUTHENTIK_CLIENT_ID: ${{ secrets.AUTHENTIK_CLIENT_ID }}
          KLIPY_API_KEY: ${{ secrets.KLIPY_API_KEY }}
        run: |
          # Same variable set as android-release.yml: the SvelteKit frontend is shared,
          # so it needs the identical build-time config (Authentik SSO included).
          echo "VITE_FRONTEND_URL=${BASE_URL}" > .env
          echo "VITE_GATEWAY_URL=${BASE_URL}" >> .env
          echo "VITE_DELIVERY_URL=${BASE_URL}" >> .env
          echo "VITE_MEDIA_URL=${BASE_URL}" >> .env
          echo "VITE_CALL_URL=${BASE_URL}" >> .env
          echo "VITE_SOCIAL_URL=${BASE_URL}" >> .env
          echo "VITE_CORE_URL=${BASE_URL}" >> .env
          echo "VITE_AUTHENTIK_URL=${AUTHENTIK_URL}" >> .env
          echo "VITE_AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}" >> .env
          echo "VITE_CALL_E2E_ENCRYPTION=false" >> .env
          if [ -n "$KLIPY_API_KEY" ]; then
            echo "VITE_KLIPY_KEY=${KLIPY_API_KEY}" >> .env
          fi

      - name: Verify frontend env for iOS build
        working-directory: frontend
        run: |
          grep -q '^VITE_FRONTEND_URL=.' .env
          grep -q '^VITE_GATEWAY_URL=.' .env
          grep -q '^VITE_DELIVERY_URL=.' .env
          grep -q '^VITE_MEDIA_URL=.' .env
          grep -q '^VITE_CALL_URL=.' .env
          grep -q '^VITE_SOCIAL_URL=.' .env
          grep -q '^VITE_CORE_URL=.' .env
          grep -q '^VITE_AUTHENTIK_URL=.' .env
          grep -q '^VITE_AUTHENTIK_CLIENT_ID=.' .env
          echo "✅ iOS frontend env prepared"

      - name: Resolve Swift Packages
        working-directory: frontend/src-tauri/gen/apple
        run: xcodebuild -resolvePackageDependencies -project canari.xcodeproj -scheme canari_iOS

      - name: Prebuild Rust static lib (libapp.a)
        working-directory: frontend/src-tauri
        run: |
          # The Xcode "Build Rust Code" phase is disabled in the hand-maintained pbxproj
          # (it shells out to bun, which isn't on Xcode's PATH), and Externals/ is
          # gitignored - so a clean checkout has no libapp.a and both the app AND the NSE
          # fail to link with `ld: library 'app' not found`. Reproduce what Tauri's
          # xcode-script does: cross-compile the app staticlib and drop it where the
          # linker search path (Externals/<arch>/<config>) expects it, as `libapp.a`.
          cargo build --lib --release --target aarch64-apple-ios
          LIB=$(find target/aarch64-apple-ios/release -maxdepth 1 -name 'libmines_app_lib.a' | head -1)
          if [ -z "$LIB" ]; then
            echo "::error::libmines_app_lib.a not produced by cargo"
            exit 1
          fi
          DEST=gen/apple/Externals/arm64/release
          mkdir -p "$DEST"
          cp "$LIB" "$DEST/libapp.a"
          echo "✅ libapp.a staged at $DEST ($(du -h "$DEST/libapp.a" | cut -f1))"

      - name: Build iOS IPA
        working-directory: frontend
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: bun tauri ios build --export-method app-store-connect -v

      - name: Locate build output
        id: outputs
        run: |
          IPA=$(find frontend/src-tauri/gen/apple/build -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa produced by the iOS build"
            exit 1
          fi
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"
          echo "IPA: $IPA"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: ${{ steps.outputs.outputs.ipa }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'workflow_run'
        with:
          tag_name: v${{ steps.release_tag.outputs.version }}
          fail_on_unmatched_files: true
          files: ${{ steps.outputs.outputs.ipa }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
