services:
  # ─────────────────────────────────────────────────────
  # Infrastructure (dépendances partagées)
  # ─────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - canari-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168  # 7 jours
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - canari-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ─────────────────────────────────────────────────────
  # Chat Gateway (Rust / Axum) — port 3000
  # ─────────────────────────────────────────────────────
  chat-gateway:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX}/chat-gateway:${TAG:-latest}
    restart: always
    environment:
      RUST_LOG: ${RUST_LOG:-chat_gateway=info,tower_http=info}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3001
      ALLOW_ORIGIN: ${ALLOW_ORIGIN:-https://canari-emse.fr}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─────────────────────────────────────────────────────
  # Chat Delivery Service (NestJS) — port 3001
  # ─────────────────────────────────────────────────────
  chat-delivery-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX}/chat-delivery-service:${TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/chat_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ─────────────────────────────────────────────────────
  # Frontend (Nginx + Svelte built) — port 80
  # ─────────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX}/frontend:${TAG:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro  # Certificats SSL
      - ./nginx/conf.d:/etc/nginx/conf.d:ro  # Config personnalisée
    depends_on:
      - chat-gateway
      - chat-delivery-service
    networks:
      - canari-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  canari-network:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  redis_data:
  mongo_data:
  mongo_config:
  postgres_data:
