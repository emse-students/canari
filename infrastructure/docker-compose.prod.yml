services:

  # ─────────────────────────────────────────────────────
  # Infrastructure (dépendances partagées)
  # ─────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    depends_on:
      - zookeeper
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:alpine
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:latest
    restart: always
    expose:
      - "27017"
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  # ─────────────────────────────────────────────────────
  # RUST SERVICES (3000-3009 range)
  # ─────────────────────────────────────────────────────

  # Chat Gateway (Rust / Axum) - port 3000
  chat-gateway:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/chat-gateway:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.chat-gateway
    expose:
      - "3000"
    environment:
      RUST_LOG: chat_gateway=info,tower_http=info
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3010
      ALLOW_ORIGIN: "*"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  call-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/call-service:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.call-service
    expose:
      - "3004"
    environment:
      RUST_LOG: info
      PORT: "3004"
      JWT_SECRET: ${JWT_SECRET}
      CLOUDFLARE_CALLS_API_TOKEN: ${CLOUDFLARE_CALLS_API_TOKEN:-}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID:-}
      CLOUDFLARE_TURN_TTL_SECONDS: ${CLOUDFLARE_TURN_TTL_SECONDS:-7200}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
      CALL_ROOM_SECRET: ${CALL_ROOM_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────
  # NODE.JS SERVICES (3010-3029 range)
  # ─────────────────────────────────────────────────────

  # Chat Delivery Service (NestJS) - New port 3010
  chat-delivery-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/chat-delivery-service:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.chat-delivery-service
    expose:
      - "3010"
    environment:
      PORT: "3010"
      NODE_ENV: ${NODE_ENV:-production}
      # Same as core/social: browser origin for CORS (same-site prod usually unaffected).
      FRONTEND_URL: ${FRONTEND_URL:-}
      POSTGRES_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      CLOUDFLARE_CALLS_API_TOKEN: ${CLOUDFLARE_CALLS_API_TOKEN:-}
      CLOUDFLARE_TURN_KEY_ID: ${CLOUDFLARE_TURN_KEY_ID:-}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-}
      # Server-to-server media fetch for rich media notifications (WP-XP-3): the push proxy relays
      # the encrypted blob from media-service using INTERNAL_SECRET.
      MEDIA_SERVICE_URL: ${MEDIA_SERVICE_URL:-http://media-service:3011}
      CALL_ROOM_SECRET: ${CALL_ROOM_SECRET:-}
      MIGALLERY_API_URL: ${MIGALLERY_API_URL:-https://gallery.mitv.fr}
      MIGALLERY_API_KEY: ${MIGALLERY_API_KEY:-}
      # Direct APNs VoIP pushes for iOS CallKit rings (WP-XP-5). Optional: unset falls
      # back to an FCM alert banner on iOS.
      APNS_VOIP_KEY_P8: ${APNS_VOIP_KEY_P8:-}
      APNS_VOIP_KEY_ID: ${APNS_VOIP_KEY_ID:-}
      APNS_VOIP_TEAM_ID: ${APNS_VOIP_TEAM_ID:-}
      APNS_VOIP_TOPIC: ${APNS_VOIP_TOPIC:-}
      APNS_VOIP_SANDBOX: ${APNS_VOIP_SANDBOX:-}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3010/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────────────────
  # MinIO - S3-compatible object storage for encrypted media blobs
  # ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-19000}:9000"   # S3 API (host configurable)
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-19001}:9001"   # Web console (host configurable)
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required - see .env.example}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required - see .env.example}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Media Service (NestJS) - New port 3011
  # Stores only opaque encrypted blobs; never sees decryption keys.
  # ─────────────────────────────────────────────────────
  media-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/media-service:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.media-service
    expose:
      - "3011"
    environment:
      PORT: "3011"
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-}
      JWT_SECRET: ${JWT_SECRET}
      # Shared secret gating server-to-server DELETE /media/:id (social-service cleanup).
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required - set via CD secrets or .env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required - set via CD secrets or .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-canari-media}
      MEDIA_MAX_SIZE_MB: "${MEDIA_MAX_SIZE_MB:-50}"
    volumes:
      - media_meta:/app/media_meta
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3011/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      minio:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Core Service (NestJS) - port 3012
  # Handles Auth, Users, Payment
  # ─────────────────────────────────────────────────────
  core-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/core-service:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.core-service
    expose:
      - "3012"
    environment:
      PORT: "3012"
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - see .env.example}"
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-}
      ENABLE_DEV_ROUTES: "${ENABLE_DEV_ROUTES:-false}"
      AUTHENTIK_BASE_URL: ${AUTHENTIK_BASE_URL:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: auth_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FORM_URL: http://social-service:3014
      FORM_SERVICE_URL: http://social-service:3014
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      SERVICE_ACCOUNT_USER_ID: ${SERVICE_ACCOUNT_USER_ID:-}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY:-}
      SKY_API_URL: ${SKY_API_URL:-https://sky.mitv.fr}
      SKY_API_KEY: ${SKY_API_KEY:-}
      MIGALLERY_API_URL: ${MIGALLERY_API_URL:-https://gallery.mitv.fr}
      MIGALLERY_API_KEY: ${MIGALLERY_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3012/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Social Service (NestJS) - port 3014
  # Handles Channels, Posts, Forms
  # ─────────────────────────────────────────────────────
  social-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/social-service:${TAG:-latest}
    restart: always
    build:
      context: ..
      dockerfile: infrastructure/local/Dockerfile.social-service
    expose:
      - "3014"
    environment:
      PORT: "3014"
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: auth_db
      REDIS_URL: redis://redis:6379
      CHANNELS_ENCRYPTION_SECRET: "${CHANNELS_ENCRYPTION_SECRET:?CHANNELS_ENCRYPTION_SECRET is required - see .env.example}"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${FRONTEND_URL:-https://canari-emse.fr}/posts?registration=success
      STRIPE_CANCEL_URL: ${FRONTEND_URL:-https://canari-emse.fr}/posts?registration=cancel
      USER_SERVICE_URL: http://core-service:3012
      PAYMENT_SERVICE_URL: http://core-service:3012
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - see .env.example}"
      MEDIA_SERVICE_URL: http://media-service:3011
      INTERNAL_SECRET: ${INTERNAL_SECRET:-}
      INTERNAL_SHARED_SECRET: ${INTERNAL_SHARED_SECRET:-}
      SERVICE_ACCOUNT_USER_ID: ${SERVICE_ACCOUNT_USER_ID:-}
      DELIVERY_INTERNAL_URL: http://chat-delivery-service:3010
      CERCLE_API_KEY: ${CERCLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3014/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_started
      core-service:
        condition: service_started
      media-service:
        condition: service_started


  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/frontend:${TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      PORT: '80'
      ORIGIN: ${ALLOW_ORIGIN:-https://canari-emse.fr}
      VITE_GATEWAY_URL: ${ALLOW_ORIGIN:-https://canari-emse.fr}
      VITE_DELIVERY_URL: ${ALLOW_ORIGIN:-https://canari-emse.fr}
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"

volumes:
  mongo_data:
  postgres_data:
  minio_data:
  media_meta:
