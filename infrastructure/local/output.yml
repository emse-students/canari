  kafka:
    depends_on:
      zookeeper:
        condition: service_started
        required: true
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_BROKER_ID: "1"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    healthcheck:
      test:
        - CMD
        - kafka-broker-api-versions
        - --bootstrap-server
        - kafka:29092
      timeout: 5s
      interval: 10s
      retries: 10
    image: confluentinc/cp-kafka:7.5.0
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9092
        published: "9092"
        protocol: tcp
    restart: on-failure
  media-service:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.media-service
    depends_on:
      minio:
        condition: service_healthy
        required: true
    environment:
      JWT_SECRET: c2615897e20c207622e7eed16ac3b865ea5f8f5c1ca165f4bdcce11524be30b7
      MEDIA_MAX_SIZE_MB: "50"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_BUCKET: canari-media
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      PORT: "3011"
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3011
        published: "3011"
        protocol: tcp
  minio:
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      timeout: 5s
      interval: 10s
      retries: 10
    image: minio/minio:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 9000
        published: "9000"
        protocol: tcp
      - mode: ingress
        target: 9001
        published: "9001"
        protocol: tcp
    volumes:
      - type: volume
        source: minio_data
        target: /data
        volume: {}
  mongo:
    environment:
      MONGO_INITDB_DATABASE: chat_db
    image: mongo:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 27017
        published: "27017"
        protocol: tcp
    volumes:
      - type: volume
        source: mongo_data
        target: /data/db
        volume: {}
  postgres:
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: password
      POSTGRES_USER: admin
    image: postgres:15-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5432"
        protocol: tcp
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
      interval: 5s
      retries: 10
    image: redis:alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 6379
        published: "6379"
        protocol: tcp
  social-service:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.social-service
    depends_on:
      core-service:
        condition: service_started
        required: true
      mongo:
        condition: service_started
        required: true
    environment:
      CHANNELS_ENCRYPTION_SECRET: dev-channel-secret-change-me
      JWT_SECRET: c2615897e20c207622e7eed16ac3b865ea5f8f5c1ca165f4bdcce11524be30b7
      PORT: "3014"
      SOCIAL_MONGO_URI: mongodb://mongo:27017/social_db
      STRIPE_CANCEL_URL: http://localhost:5173/posts?registration=cancel
      STRIPE_SECRET_KEY: ""
      STRIPE_SUCCESS_URL: http://localhost:5173/posts?registration=success
      USER_SERVICE_URL: http://core-service:3012
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3014
        published: "3014"
        protocol: tcp
  zookeeper:
    environment:
      ZOOKEEPER_CLIENT_PORT: "2181"
      ZOOKEEPER_TICK_TIME: "2000"
    image: confluentinc/cp-zookeeper:7.5.0
    networks:
      default: null
networks:
  default:
    name: local_default
volumes:
  minio_data:
    name: local_minio_data
  mongo_data:
    name: local_mongo_data
  postgres_data:
    name: local_postgres_data
