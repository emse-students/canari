name: local
services:
  call-service:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.call-service
    depends_on:
      kafka:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      PORT: "3001"
      RUST_LOG: call_service=info,tower_http=info
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3001
        published: "3001"
        protocol: tcp
  chat-delivery-service:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.chat-delivery-service
    depends_on:
      kafka:
        condition: service_healthy
        required: true
      mongo:
        condition: service_started
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      KAFKA_BROKERS: kafka:29092
      PORT: "3010"
      POSTGRES_URL: postgres://admin:password@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3010
        published: "3010"
        protocol: tcp
  chat-gateway:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.chat-gateway
    depends_on:
      kafka:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ALLOW_ORIGIN: '*'
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3001
      JWT_SECRET: c2615897e20c207622e7eed16ac3b865ea5f8f5c1ca165f4bdcce11524be30b7
      KAFKA_BROKERS: kafka:29092
      REDIS_URL: redis://redis:6379
      RUST_LOG: chat_gateway=info,tower_http=info
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3000
        published: "3000"
        protocol: tcp
  core-service:
    build:
      context: D:\Documents\Programmation\EMSE\Canari
      dockerfile: infrastructure/local/Dockerfile.core-service
    depends_on:
      postgres:
        condition: service_started
        required: true
    environment:
      DB_DATABASE: auth_db
      DB_HOST: postgres
      DB_PASSWORD: password
      DB_PORT: "5432"
      DB_USERNAME: admin
      JWT_SECRET: c2615897e20c207622e7eed16ac3b865ea5f8f5c1ca165f4bdcce11524be30b7
      PORT: "3012"
      STRIPE_SECRET_KEY: ""
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3012
        published: "3012"
        protocol: tcp
  coturn:
    command:
      - -n
      - --log-file=stdout
      - --min-port=49000
      - --max-port=49040
      - --realm=localhost
      - --user=user:password
      - --lt-cred-mech
      - --fingerprint
      - --no-tls
      - --no-dtls
    image: coturn/coturn
    networks:
      default: null
    ports:
      - mode: ingress
        target: 3478
        published: "3478"
        protocol: tcp
      - mode: ingress
        target: 3478
        published: "3478"
        protocol: udp
