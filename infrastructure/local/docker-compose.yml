services:

  # ─────────────────────────────────────────────────────
  # Infrastructure (dépendances partagées)
  # ─────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: on-failure
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Double listener : Docker interne + accès depuis l'hôte local
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "5349:5349/udp"
      - "49000-49040:49000-49040/udp"
    command:
      - -n
      - --log-file=stdout
      - --min-port=49000
      - --max-port=49040
      - --realm=localhost
      - --user=user:password
      - --lt-cred-mech
      - --fingerprint
      - --no-tls
      - --no-dtls

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────────────
  # RUST SERVICES (3000-3009 range)
  # ─────────────────────────────────────────────────────

  # Chat Gateway (Rust / Axum) — port 3000
  chat-gateway:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-gateway
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: chat_gateway=info,tower_http=info
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3010
      ALLOW_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # NODE.JS SERVICES (3010-3029 range)
  # ─────────────────────────────────────────────────────

  # Chat Delivery Service (NestJS) — New port 3010
  chat-delivery-service:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-delivery-service
    ports:
      - "3010:3010"
    environment:
      PORT: "3010"
      POSTGRES_URL: postgres://admin:password@postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # MinIO – S3-compatible object storage for encrypted media blobs
  # ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Media Service (NestJS) — New port 3011
  # Stores only opaque encrypted blobs; never sees decryption keys.
  # ─────────────────────────────────────────────────────
  media-service:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.media-service
    ports:
      - "3011:3011"
    environment:
      PORT: "3011"
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-canari-media}
      MEDIA_MAX_SIZE_MB: "${MEDIA_MAX_SIZE_MB:-50}"
    depends_on:
      minio:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Core Service (NestJS) — port 3012
  # Handles Auth, Users, Payment
  # ─────────────────────────────────────────────────────
  core-service:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.core-service
    ports:
      - "3012:3012"
    environment:
      PORT: "3012"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_DATABASE: auth_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      FORM_SERVICE_URL: http://social-service:3014
    depends_on:
      postgres:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Social Service (NestJS) — port 3014
  # Handles Channels, Posts, Forms
  # ─────────────────────────────────────────────────────
  social-service:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.social-service
    ports:
      - "3014:3014"
    environment:
      PORT: "3014"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_DATABASE: auth_db
      CHANNELS_ENCRYPTION_SECRET: ${CHANNELS_ENCRYPTION_SECRET:-dev-channel-secret-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:5173/posts?registration=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:5173/posts?registration=cancel}
      USER_SERVICE_URL: http://core-service:3012
      PAYMENT_SERVICE_URL: http://core-service:3012
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_started
      core-service:
        condition: service_started

volumes:
  mongo_data:
  postgres_data:
  minio_data:
