services:

  # ─────────────────────────────────────────────────────
  # Infrastructure (dépendances partagées)
  # ─────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Les services tournent dans le même réseau Docker → advertise le nom de service
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────────────
  # Chat Gateway (Rust / Axum) — port 3000
  # ─────────────────────────────────────────────────────
  chat-gateway:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-gateway
    ports:
      - "3000:3000"
    environment:
      RUST_LOG: chat_gateway=info,tower_http=info
      JWT_SECRET: "9a2f8c4e6b0d71f3e8b925b1234567890abcdef1234567890abcdef12345678"
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3001
      ALLOW_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Chat Delivery Service (NestJS) — port 3001
  # ─────────────────────────────────────────────────────
  chat-delivery-service:
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-delivery-service
    ports:
      - "3001:3001"
    environment:
      MONGO_URI: mongodb://mongo:27017/chat_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started

volumes:
  mongo_data:
  postgres_data:
