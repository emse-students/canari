services:

  # ─────────────────────────────────────────────────────
  # Infrastructure (dépendances partagées)
  # ─────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: on-failure
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:latest
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: chat_db
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ─────────────────────────────────────────────────────
  # RUST SERVICES (3000-3009 range)
  # ─────────────────────────────────────────────────────

  # Chat Gateway (Rust / Axum) — port 3100 (DEV)
  chat-gateway:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/chat-gateway:${TAG:-dev}
    restart: always
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-gateway
    ports:
      - "3100:3000"
    environment:
      RUST_LOG: chat_gateway=info,tower_http=info
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6380
      KAFKA_BROKERS: kafka:29093
      DELIVERY_SERVICE_URL: http://chat-delivery-service:3110
      ALLOW_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # NODE.JS SERVICES (3010-3029 range)
  # ─────────────────────────────────────────────────────

  # Chat Delivery Service (NestJS) — New port 3110 (DEV)
  chat-delivery-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/chat-delivery-service:${TAG:-dev}
    restart: always
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.chat-delivery-service
    ports:
      - "3110:3010"
    environment:
      PORT: "3010"
      POSTGRES_URL: postgres://admin:password@postgres:5433/auth_db
      REDIS_HOST: redis
      REDIS_PORT: "6380"
      KAFKA_BROKERS: kafka:29093
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # MinIO – S3-compatible object storage for encrypted media blobs
  # ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_HOST_PORT:-19100}:9000"   # S3 API (host configurable)
      - "${MINIO_CONSOLE_HOST_PORT:-19101}:9001"   # Web console (host configurable)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Media Service (NestJS) — New port 3111 (DEV)
  # Stores only opaque encrypted blobs; never sees decryption keys.
  # ─────────────────────────────────────────────────────
  media-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/media-service:${TAG:-dev}
    restart: always
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.media-service
    ports:
      - "3111:3011"
    environment:
      PORT: "3011"
      JWT_SECRET: ${JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: "${MINIO_PORT:-9000}"
      MINIO_USE_SSL: "${MINIO_USE_SSL:-false}"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      MINIO_BUCKET: ${MINIO_BUCKET:-canari-media}
      MEDIA_MAX_SIZE_MB: "${MEDIA_MAX_SIZE_MB:-50}"
    depends_on:
      minio:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Core Service (NestJS) — port 3112 (DEV)
  # Handles Auth, Users, Payment
  # ─────────────────────────────────────────────────────
  core-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/core-service:${TAG:-dev}
    restart: always
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.core-service
    ports:
      - "3112:3012"
    environment:
      PORT: "3012"
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      ENABLE_DEV_ROUTES: "${ENABLE_DEV_ROUTES:-false}"
      AUTHENTIK_BASE_URL: ${AUTHENTIK_BASE_URL:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_DATABASE: auth_db      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      AVATAR_API_URL: ${AVATAR_API_URL:-https://gallery.mitv.fr}
      AVATAR_API_KEY: ${AVATAR_API_KEY:-}      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      AVATAR_API_URL: ${AVATAR_API_URL:-https://gallery.mitv.fr}
      AVATAR_API_KEY: ${AVATAR_API_KEY:-}
    depends_on:
      postgres:
        condition: service_started

  # ─────────────────────────────────────────────────────
  # Social Service (NestJS) — port 3114 (DEV)
  # Handles Channels, Posts, Forms
  # ─────────────────────────────────────────────────────
  social-service:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/social-service:${TAG:-dev}
    restart: always
    build:
      context: ../../
      dockerfile: infrastructure/local/Dockerfile.social-service
    ports:
      - "3114:3014"
    environment:
      PORT: "3014"
      DB_HOST: postgres
      DB_PORT: "5433"
      DB_USERNAME: admin
      DB_PASSWORD: password
      DB_DATABASE: auth_db
      CHANNELS_ENCRYPTION_SECRET: ${CHANNELS_ENCRYPTION_SECRET:-dev-channel-secret-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:5173/posts?registration=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:5173/posts?registration=cancel}
      USER_SERVICE_URL: http://core-service:3112
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_started
      core-service:
        condition: service_started


  frontend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-emse-students/canari}/frontend:${TAG:-dev}
    restart: always
    environment:
      NODE_ENV: production
      PORT: '80'
      ORIGIN: ${ALLOW_ORIGIN:-https://dev.canari-emse.fr}
      VITE_GATEWAY_URL: ${ALLOW_ORIGIN:-https://dev.canari-emse.fr}
      VITE_DELIVERY_URL: ${ALLOW_ORIGIN:-https://dev.canari-emse.fr}
    ports:
      - "${FRONTEND_HOST_PORT:-3080}:80"

volumes:
  mongo_data:
  postgres_data:
  minio_data:
