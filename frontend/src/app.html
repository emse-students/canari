<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Canari : fil social, associations, agenda et messagerie chiffrée pour la communauté EMSE."
    />
    <!-- Applique le thème avant le premier paint pour éviter le flash blanc/noir. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('canari-theme');
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.dataset.theme = 'dark';
        } catch (_) {}
      })();
    </script>
    <style>
      html,
      body {
        background: #f9fbff;
      }
      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #070b12;
      }
    </style>
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#122035" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Canari</title>
    <meta name="application-name" content="Canari" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
