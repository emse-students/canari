<!doctype html>
<html lang="fr" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Canari : fil social, associations, agenda et messagerie chiffrée pour la communauté EMSE."
    />
    <!-- Applique le thème avant le premier paint pour éviter le flash blanc/noir. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('canari-theme');
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.dataset.theme = 'dark';
        } catch (_) {}
      })();
    </script>
    <style>
      html,
      body {
        background: #f9fbff;
      }
      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background: #070b12;
      }
      #canari-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #070b12;
        transition: opacity 0.4s ease-out;
      }
      html[data-theme='light'] #canari-splash {
        background: #0f1c2e;
      }
      #canari-splash.done {
        opacity: 0;
        pointer-events: none;
      }
      #canari-splash img {
        width: 88px;
        height: 88px;
        animation: splash-pulse 2s ease-in-out infinite;
      }
      #canari-splash span {
        color: #fac809;
        font-weight: 800;
        font-size: 1.75rem;
        letter-spacing: 0.04em;
        margin-top: 18px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.07);
          opacity: 0.8;
        }
      }
    </style>
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#122035" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Canari</title>
    <meta name="application-name" content="Canari" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="canari-splash" aria-hidden="true">
      <img src="/favicon.svg" alt="" />
      <span>canari</span>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
